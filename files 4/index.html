<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#15181d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tralog</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2315181d'/%3E%3Cpath d='M24 28h52M50 28v46' stroke='%23c3f53c' stroke-width='12' stroke-linecap='round'/%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ===== デザイン: ダーク基調 + アクセント1色（ライム） ===== */
  :root {
    --primary: #c3f53c;            /* アクセント: ライム */
    --primary-dark: #aede2e;       /* hover用 やや深いライム */
    --primary-light: rgba(195, 245, 60, 0.14);
    --on-primary: #131807;         /* ライム上のテキスト色 */
    --success: #7bd94a;
    --danger: #ff6b5e;
    --warning: #f0a83c;
    --bg: #0d0f13;
    --surface: #15181d;            /* ページ基調 */
    --surface-2: #0f1216;          /* インセット面（入力・セル） */
    --border: #2b303a;
    --text: #f2f4f6;
    --muted: #aab4c0;
    --radius: 16px;
    --shadow: 0 2px 14px rgba(0, 0, 0, 0.35);

    /* カテゴリーカラー（ダーク背景向けに明度アップ / 拡張時もここに追記するだけ） */
    --cat-chest: #ff7a6e;
    --cat-arm: #ffb347;
    --cat-shoulder: #ffd34d;
    --cat-back: #4fd58c;
    --cat-leg: #5aa3ff;
    --cat-glute: #e07ad0;
    --cat-abs: #38d9d9;
    --cat-cardio: #ff7a6e;
    --cat-other: #9aa2ae;
  }

  body {
    background: var(--surface);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1080px; margin: 0 auto; padding: 0 20px 96px; }

  /* ===== ヘッダー / 固定フッター ===== */
  .app-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-size: clamp(24px, 4vw, 30px);
    font-weight: 900;
    letter-spacing: -0.02em;
    align-self: center;
    padding: 12px 0;
    line-height: 1.1;
    background: linear-gradient(120deg, var(--primary), #4fd58c);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .app-footer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 40;
    background: color-mix(in srgb, var(--surface) 94%, transparent);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(14px);
  }
  .footer-inner {
    max-width: 1080px;
    margin: 0 auto;
    padding: 10px 20px calc(10px + env(safe-area-inset-bottom));
    display: block;
    align-items: center;
    gap: 8px;
  }

  /* タブナビ（モジュールごとに自動生成・アイコン表示） */
  .tabbar {
    display: flex;
    justify-content: space-around;
    gap: 2px;
    overflow-x: auto;
  }
  .tabbar button {
    flex: 0 0 auto;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    min-height: 58px;
    padding: 10px 14px 8px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tabbar button .tab-ico { font-size: 20px; line-height: 1.2; }
  .tabbar svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .tabbar button .tab-lbl { font-size: 12px; font-weight: 800; }
  .tabbar button:hover { color: var(--text); }
  .tabbar button.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tabbar button .soon { font-size: 10px; opacity: 0.8; font-weight: 600; }
  .account-btn {
    align-self: center;
    border: none;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    border-radius: 12px;
    font-size: 22px;
    font-weight: 800;
    padding: 8px 10px;
    white-space: nowrap;
  }
  .account-btn:hover { color: var(--primary); background: var(--surface-2); }

  .module-view { animation: fade 0.2s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* セクションは枠ではなく線で区切る */
  .panel {
    background: transparent;
    border: none;
    border-radius: 0;
    box-shadow: none;
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
  }
  .panel:last-child { border-bottom: none; }

  /* ===== モチベーションヒーロー ===== */
  .hero-stats { display: flex; flex-wrap: wrap; gap: 14px 0; margin-top: 18px; }
  .hero-stat { padding: 0 22px; border-left: 1px solid var(--border); min-width: 120px; }
  .hs-lbl { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .hs-val { font-size: 30px; font-weight: 900; line-height: 1.2; }
  .hs-val small { font-size: 13px; font-weight: 700; color: var(--muted); }

  /* ===== カレンダー ===== */
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-title { font-size: 20px; font-weight: 800; }
  .cal-nav { display: flex; gap: 8px; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text); cursor: pointer; font-size: 16px;
    display: inline-flex; align-items: center; justify-content: center; transition: 0.15s;
  }
  .icon-btn:hover { border-color: var(--primary); color: var(--primary); }
  .btn {
    border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: 0.15s; background: var(--primary); color: var(--on-primary);
  }
  .btn:hover { background: var(--primary-dark); }
  .btn.ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn.ghost:hover { border-color: var(--primary); color: var(--primary); }
  .btn.danger { background: transparent; color: var(--danger); border: 1px solid var(--border); }
  .btn.danger:hover { border-color: var(--danger); background: rgba(226,75,74,0.08); }
  .btn.sm { padding: 6px 12px; font-size: 13px; }
  .btn.block { width: 100%; }

  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 6px; }
  .weekdays span { text-align: center; font-size: 12px; font-weight: 700; color: var(--muted); padding: 4px 0; }
  .weekdays span.sun { color: var(--danger); }
  .weekdays span.sat { color: var(--primary); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-cell {
    position: relative; min-height: 74px; border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface-2); padding: 6px; cursor: pointer; transition: 0.12s; overflow: hidden;
    /* スマホ長押しで文字選択・メニューを出さない */
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }
  .cal-cell:hover { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light) inset; }
  .cal-cell.empty { background: transparent; border: none; cursor: default; }
  .cal-cell.today { border-color: var(--primary); }
  .cal-cell.today .daynum { background: var(--primary); color: var(--on-primary); }
  .cal-cell.selected { box-shadow: 0 0 0 2px var(--primary) inset; }
  .daynum {
    font-size: 13px; font-weight: 700; width: 24px; height: 24px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cal-cell.sun .daynum { color: var(--danger); }
  .cal-cell.sat .daynum { color: var(--primary); }
  .cal-cell.today .daynum { color: var(--on-primary); }
  .dots { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .cell-count {
    position: absolute; bottom: 5px; right: 7px; font-size: 10px; font-weight: 700; color: var(--muted);
  }

  /* ===== 凡例 ===== */
  .legend { display: flex; flex-wrap: wrap; gap: 10px 16px; margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--border); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-item .dot { width: 10px; height: 10px; }

  /* ===== 日別詳細 ===== */
  .day-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .day-date { font-size: 18px; font-weight: 800; }
  .day-date small { display: block; font-size: 12px; font-weight: 600; color: var(--muted); }

  .cat-group { margin-bottom: 14px; }
  .cat-group-head { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 14px; margin-bottom: 8px; }
  .cat-badge { width: 10px; height: 10px; border-radius: 50%; }

  .ex-card {
    border: 1px solid var(--border); border-radius: 12px; background: var(--surface-2);
    padding: 12px 14px; margin-bottom: 8px;
  }
  .ex-card-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .ex-name { font-weight: 700; }
  .ex-sets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .set-chip {
    font-size: 12px; font-weight: 600; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 9px; color: var(--muted);
  }
  .set-chip b { color: var(--text); }
  .ex-memo { font-size: 13px; color: var(--muted); margin-top: 8px; font-style: italic; }
  .ex-actions { display: flex; gap: 4px; }
  .link-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 6px; }
  .link-btn:hover { color: var(--primary); background: var(--primary-light); }
  .link-btn.del:hover { color: var(--danger); background: rgba(226,75,74,0.08); }

  .empty-state { text-align: center; color: var(--muted); padding: 30px 10px; font-size: 14px; }
  .empty-state .big { font-size: 30px; margin-bottom: 8px; }

  /* ===== モーダル ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none;
    align-items: flex-start; justify-content: center; padding: 20px; z-index: 50; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 18px; width: 100%; max-width: 520px; margin: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: pop 0.18s ease;
  }
  @keyframes pop { from { transform: scale(0.96); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-head { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-head h3 { font-size: 17px; }
  .modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; overflow-x: hidden; }
  .modal-body .pfc-grid > div, .modal-body .field { min-width: 0; }
  .modal-body .toolbar .file-btn { flex: 1 1 150px; justify-content: center; min-width: 0; }
  .modal-foot { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  label.field-label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; min-width: 0; max-width: 100%;
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface-2); color: var(--text); font-size: 16px; font-family: inherit;
  }
  /* iOSは入力欄の文字が16px未満だとフォーカス時に画面全体を強制ズームする。
     16px確保が最も確実な対策（UIバランスを保つため見た目は少し縮小して表示） */
  input, select { font-size: max(16px, 0.875em); }
  @supports (-webkit-touch-callout: none) {
    input, select, textarea { font-size: 16px; }
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
  /* iOSのdate/time入力はネイティブ描画で固有幅を持ち枠からはみ出すため、通常入力と同じ見た目に統一 */
  input[type="date"], input[type="time"] {
    -webkit-appearance: none; appearance: none;
    display: block; width: 100%; min-height: 46px; text-align: left;
  }
  input[type="date"]::-webkit-date-and-time-value { text-align: left; }
  .field { margin-bottom: 16px; }

  .cat-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .cat-chip {
    border: 1px solid var(--border); background: var(--surface-2); border-radius: 999px;
    padding: 7px 14px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.12s;
    display: inline-flex; align-items: center; gap: 6px; color: var(--text);
  }
  .cat-chip:hover { border-color: var(--primary); }
  .cat-chip.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
  .cat-chip.active .cat-badge { box-shadow: 0 0 0 2px rgba(255,255,255,0.6); }

  .menu-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 480px) { .menu-list { grid-template-columns: 1fr; } }
  .menu-item {
    text-align: left; border: 1px solid var(--border); background: var(--surface-2);
    border-radius: 10px; padding: 10px 12px; font-size: 14px; cursor: pointer; transition: 0.12s; color: var(--text);
  }
  .menu-item:hover { border-color: var(--primary); color: var(--primary); }
  .menu-item.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 700; }
  .menu-item .tag { font-size: 10px; color: var(--muted); margin-left: 4px; }
  .menu-item.custom .tag { color: var(--warning); }
  .menu-item { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .menu-item .mi-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mi-actions { display: flex; gap: 2px; flex: 0 0 auto; }
  .mi-ico { border: none; background: transparent; cursor: pointer; font-size: 12px; padding: 2px 5px; border-radius: 6px; opacity: 0.65; line-height: 1; }
  .mi-ico:hover { opacity: 1; background: rgba(128,128,128,0.18); }
  .inline-form { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
  .inline-form input { flex: 1; min-width: 130px; }
  .inline-form select { width: auto; flex: 0 0 auto; }

  .sets-editor .set-row { display: grid; grid-template-columns: 28px 1fr 1fr 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .sets-editor .set-row .setno { font-weight: 700; color: var(--muted); font-size: 13px; text-align: center; }
  .sets-editor .unit { position: relative; }
  .sets-editor .unit span { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--muted); pointer-events: none; }
  .sets-editor .set-row input { padding-right: 30px; }
  .remove-set { border: 1px solid var(--border); background: var(--surface-2); border-radius: 8px; cursor: pointer; height: 38px; color: var(--danger); }
  .remove-set:hover { border-color: var(--danger); }

  .cardio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .section-title { font-size: 15px; font-weight: 800; margin: 4px 0 12px; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

  /* オリジナルメニュー管理 */
  .custom-menu-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface-2); margin-bottom: 8px; }
  .custom-menu-row .info { display: flex; align-items: center; gap: 8px; }
  .routine-list { display: grid; gap: 10px; margin-top: 12px; }
  .routine-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; border-left: 1px solid var(--border); padding: 8px 0 8px 14px; }
  .routine-title { font-weight: 800; }
  .routine-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .routine-editor { display: grid; gap: 10px; }
  .routine-ex-row { border-left: 1px solid var(--border); padding-left: 12px; display: grid; gap: 8px; }
  .routine-ex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 520px) { .routine-ex-grid { grid-template-columns: 1fr; } .routine-row { align-items: flex-start; flex-direction: column; } }

  .placeholder-card { text-align: center; padding: 50px 20px; }
  .placeholder-card .big { font-size: 44px; margin-bottom: 12px; }
  .placeholder-card h2 { font-size: 20px; margin-bottom: 8px; }
  .placeholder-card p { color: var(--muted); max-width: 460px; margin: 0 auto; }

  /* ===== 前回値ヒント ===== */
  .prev-hint {
    background: var(--primary-light); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 14px; font-size: 13px; display: flex; align-items: center;
    justify-content: space-between; gap: 10px; flex-wrap: wrap;
  }
  .prev-hint .pv-label { font-weight: 700; color: var(--primary); }
  .prev-hint .pv-body { color: var(--muted); }
  .prev-hint .pv-body b { color: var(--text); }

  /* ===== 分析パネル / チャート ===== */
  .stats-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .stats-head h2 { font-size: 17px; }
  .chart-wrap { position: relative; height: 260px; margin-top: 8px; }
  .chart-wrap.sm { height: 200px; }
  .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 14px 0; margin: 14px 0; }
  .stat-card { background: none; border: none; border-radius: 0; border-left: 1px solid var(--border); padding: 2px 16px; }
  .stat-card .lbl { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .stat-card .val { font-size: 22px; font-weight: 800; margin-top: 2px; }
  .stat-card .val small { font-size: 12px; font-weight: 600; color: var(--muted); }
  .stat-card .delta { font-size: 12px; font-weight: 700; margin-top: 2px; }
  .delta.up { color: var(--success); }
  .delta.down { color: var(--danger); }
  .delta.flat { color: var(--muted); }

  /* ===== コーチコメント ===== */
  .coach-box { display: flex; gap: 12px; align-items: flex-start; border-left: 3px solid var(--primary); padding: 4px 0 4px 16px; margin-top: 4px; }
  .coach-ava { font-size: 26px; flex: 0 0 auto; line-height: 1.2; }
  .trend-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .trend-chip { font-size: 13px; font-weight: 700; border-radius: 999px; padding: 5px 12px; border: 1px solid var(--border); background: var(--surface); }
  .trend-chip.up { color: var(--success); border-color: rgba(99,153,34,0.4); }
  .trend-chip.down { color: var(--danger); border-color: rgba(226,75,74,0.4); }
  .trend-chip.flat { color: var(--muted); }

  /* ===== AIトレーナー / 写真推定 ===== */
  .trainer-screen {
    height: calc(100dvh - 150px);
    min-height: 520px;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border-radius: 22px;
    overflow: hidden;
  }
  .trainer-top {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .trainer-name { font-weight: 900; font-size: 13px; letter-spacing: 0.02em; }
  .chat-box { flex: 1 1 auto; overflow-y: auto; display: grid; align-content: start; gap: 10px; background: transparent; border-radius: 0; padding: 14px; }
  .chat-msg { max-width: 82%; justify-self: start; }
  .chat-msg.user { justify-self: end; text-align: left; }
  .chat-msg .role { display: none; }
  .chat-msg .text {
    margin-top: 0;
    white-space: pre-wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px 18px 18px 4px;
    padding: 11px 14px;
    font-size: 15px;
    line-height: 1.65;
  }
  .chat-msg.user .text {
    background: #d9fdd3;
    color: #111;
    border-color: #c7edc0;

  </div>

  <p class="footer-note">データはこのブラウザ内（localStorage）に保存されます。</p>
</div>

<footer class="app-footer">
  <div class="footer-inner">
    <nav class="tabbar" id="tabbar"></nav>
  </div>
</footer>

<!-- 記録追加・編集モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">トレーニングを追加</h3>
      <button class="icon-btn" data-close>✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn ghost" data-close>キャンセル</button>
      <button class="btn" id="modalSave">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- レストタイマー（モーダルを閉じても継続する常駐ピル） -->
<div class="rest-timer" id="restTimer" role="timer" aria-live="polite">
  <span class="rt-ico">⏱</span>
  <span class="rt-time" id="restTimerTime">0:00</span>
  <button type="button" id="restTimerPlus">+30s</button>
  <button type="button" id="restTimerStop" aria-label="タイマー停止">✕</button>
</div>

<script>
/* =====================================================================
 *  Workout Tracker  -  単一HTMLアプリ
 *  拡張方針:
 *   - 機能は「モジュール」として App.registerModule() で登録 → タブが自動生成
 *   - データは Store が一元管理（モジュールごとに名前空間を分離）
 *   - 体組成 / 食事管理 などは module を追加するだけで組み込める
 * ===================================================================== */

/* ---------------- Store: 永続化レイヤー ---------------- */
const Store = (() => {
  const KEY = 'fittrack.v1';
  let data = load();

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { console.warn('load失敗', e); }
    return { version: 1 };
  }
  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify(data));
    } catch (e) {
      console.error('保存失敗', e);
      try { toast('⚠ データ保存に失敗しました（容量不足の可能性）。バックアップを取ってください'); } catch (_) {}
    }
  }

  // 全データのJSONバックアップ / 復元
  function exportAll() { return JSON.stringify(data, null, 2); }
  function importAll(json) {
    const obj = JSON.parse(json);
    if (!obj || typeof obj !== 'object' || Array.isArray(obj)) throw new Error('不正なバックアップファイルです');
    data = obj;
    if (!data.version) data.version = 1;
    save();
  }

  // モジュールごとの名前空間を取得（無ければ初期値で作成）
  function ns(name, initial = {}) {
    if (!data[name]) { data[name] = initial; save(); }
    return data[name];
  }
  return { get data() { return data; }, save, ns, exportAll, importAll };
})();

/* ---------------- 共通ユーティリティ ---------------- */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const pad = n => String(n).padStart(2, '0');
const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const WEEK_JP = ['日', '月', '火', '水', '木', '金', '土'];

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ---------------- レストタイマー（グローバル常駐） ---------------- */
const RestTimer = (() => {
  const el = document.getElementById('restTimer');
  const timeEl = document.getElementById('restTimerTime');
  let endAt = null, iv = null;

  function fmt(sec) { return `${Math.floor(sec / 60)}:${pad(sec % 60)}`; }

  function tick() {
    const rest = Math.max(0, Math.ceil((endAt - Date.now()) / 1000));
    timeEl.textContent = fmt(rest);
    if (rest <= 0) {
      clearInterval(iv); iv = null;
      el.classList.add('done');
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      toast('レスト終了！次のセットへ 💪');
      setTimeout(() => { if (!iv) hide(); }, 3000);
    }
  }
  function run() { clearInterval(iv); iv = setInterval(tick, 250); tick(); }
  function start(sec) {
    endAt = Date.now() + sec * 1000;
    el.classList.add('on'); el.classList.remove('done');
    run();
  }
  function hide() { el.classList.remove('on', 'done'); clearInterval(iv); iv = null; endAt = null; }

  document.getElementById('restTimerPlus').onclick = () => {
    if (!endAt) return;
    endAt = Math.max(endAt, Date.now()) + 30000;
    el.classList.remove('done');
    run();
  };
  document.getElementById('restTimerStop').onclick = hide;
  return { start };
})();

/* ---------------- 数値 / 日付ヘルパ ---------------- */
function parseNum(v) {
  if (v === null || v === undefined) return undefined;
  const cleaned = String(v).replace(/,/g, '').replace(/[^\d.\-]/g, '').trim();
  if (!cleaned || cleaned === '-') return undefined;
  const n = Number(cleaned);
  return Number.isFinite(n) ? n : undefined;
}
function round(v, d = 1) { if (!Number.isFinite(v)) return undefined; const b = 10 ** d; return Math.round(v * b) / b; }
function fmtMonthDay(key) { const [, m, d] = key.split('-'); return `${Number(m)}/${Number(d)}`; }
// InBody等の様々な日付表記を YYYY-MM-DD に正規化
function normDateKey(value) {
  const raw = String(value || '').trim();
  if (!raw) return null;
  const digits = raw.replace(/[^\d]/g, '');
  if (digits.length >= 8) return `${digits.slice(0, 4)}-${digits.slice(4, 6)}-${digits.slice(6, 8)}`;
  const dt = new Date(raw.replace(/\//g, '-'));
  return Number.isNaN(dt.getTime()) ? null : dateKey(dt);
}

/* ---------------- CSV パーサ（引用符対応） ---------------- */
function parseCSV(text) {
  const rows = []; let row = [], cell = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i + 1];
    if (c === '"' && q && n === '"') { cell += '"'; i++; }
    else if (c === '"') { q = !q; }
    else if (c === ',' && !q) { row.push(cell); cell = ''; }
    else if ((c === '\n' || c === '\r') && !q) {
      if (c === '\r' && n === '\n') i++;
      row.push(cell);
      if (row.some(v => String(v).trim() !== '')) rows.push(row);
      row = []; cell = '';
    } else cell += c;
  }
  row.push(cell);
  if (row.some(v => String(v).trim() !== '')) rows.push(row);
  return rows;
}

/* ---------------- Chart.js ラッパ（インスタンス管理） ---------------- */
const Charts = (() => {
  const instances = {};
  function gridColor() {
    return getComputedStyle(document.body).getPropertyValue('color').trim() ? 'rgba(128,128,128,0.18)' : 'rgba(128,128,128,0.18)';
  }
  let zoomRegistered = false;
  function ensureZoom() {
    if (!zoomRegistered && typeof Chart !== 'undefined' && window.ChartZoom) {
      Chart.register(window.ChartZoom);
    }
    zoomRegistered = true;
  }
  let defaultsSet = false;
  function setDefaults() {
    if (defaultsSet || typeof Chart === 'undefined') return;
    Chart.defaults.font.size = 12.5;
    Chart.defaults.color = cssVar('--muted');
    defaultsSet = true;
  }
  function draw(canvasId, config) {
    if (typeof Chart === 'undefined') return;
    setDefaults();
    ensureZoom();
    if (instances[canvasId]) instances[canvasId].destroy();
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    config.options = config.options || {};
    config.options.responsive = true;
    config.options.maintainAspectRatio = false;
    config.options.plugins = config.options.plugins || {};
    config.options.plugins.legend = config.options.plugins.legend || { labels: { color: cssVar('--muted'), usePointStyle: true, pointStyle: 'circle', boxWidth: 8, boxHeight: 8, padding: 14 } };
    config.options.scales = config.options.scales || {};
    for (const ax of ['x', 'y', 'y1']) if (config.options.scales[ax]) Object.assign(config.options.scales[ax], { ticks: { color: cssVar('--muted'), ...(config.options.scales[ax].ticks || {}) }, grid: { color: gridColor(), ...(config.options.scales[ax].grid || {}) } });
    instances[canvasId] = new Chart(ctx, config);
    if (config.type === 'line') autoPoints(instances[canvasId]);
    return instances[canvasId];
  }
  function get(canvasId) { return instances[canvasId]; }
  // 「全体」ボタン用: 初期表示が絞られていても全期間を表示する
  function resetZoom(canvasId) {
    const c = instances[canvasId];
    if (!c) return;
    if (c.options.scales && c.options.scales.x) { c.options.scales.x.min = undefined; c.options.scales.x.max = undefined; }
    c.update();
    autoPoints(c);
  }
  return { draw, get, resetZoom };
})();
function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#888'; }
// 折れ線グラフ共通: ピンチ/ホイールで拡大・ドラッグで移動
// maxIndex を渡すと全データ範囲までパン可能（初期表示を絞っている場合用）
function zoomOpts(maxIndex) {
  const limits = { x: { minRange: 2 } };
  if (Number.isFinite(maxIndex)) { limits.x.min = 0; limits.x.max = maxIndex; }
  return {
    pan: { enabled: true, mode: 'x', onPanComplete: ({ chart }) => autoPoints(chart) },
    zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x', onZoomComplete: ({ chart }) => autoPoints(chart) },
    limits,
  };
}
// 初期表示を「最新記録の日付」基準で直近nヶ月に絞るためのx軸開始インデックス。
// 今日基準にすると、記録が古い場合に該当ゼロ→全体表示になってしまうため最終データを基準にする。
// 全期間はズームアウト/「全体」ボタンで見られる。
function recentStartIndex(dateKeys, months = 2) {
  if (!dateKeys || !dateKeys.length) return undefined;
  const lastKey = dateKeys[dateKeys.length - 1];
  const [y, m, d] = lastKey.split('-').map(Number);
  const cut = new Date(y, m - 1, d);
  cut.setMonth(cut.getMonth() - months);
  const cutKey = dateKey(cut);
  const idx = dateKeys.findIndex(k => k >= cutKey);
  return idx > 0 ? idx : undefined;
}
function edgeXTicks(count) {
  return {
    maxRotation: 0,
    autoSkip: false,
    callback(value) {
      const x = this.chart.scales.x;
      const min = Math.ceil(x.min ?? 0);
      const max = Math.floor(x.max ?? (count - 1));
      return value === min || value === max ? this.getLabelForValue(value) : '';
    },
  };
}
// 表示中のデータ点数に応じて点の表示/非表示を決める。
// 描画のたびに評価されるscriptable関数なので、ズーム操作のイベント漏れが起きない
function dynPointRadius(ctx) {
  const chart = ctx.chart;
  const total = (chart.data.labels || []).length;
  const x = chart.scales && chart.scales.x;
  const visible = x && x.max != null ? Math.floor(x.max) - Math.ceil(x.min ?? 0) + 1 : total;
  return visible >= 25 ? 0 : 4;
}
function autoPoints(chart) {
  if (!chart || chart.config.type !== 'line') return;
  chart.data.datasets.forEach(ds => {
    ds.pointRadius = dynPointRadius;
    ds.pointHoverRadius = 6;
    ds.pointHitRadius = 16;          // 点が非表示のときもタップでツールチップは出せる
    ds.pointBorderWidth = 2;
    ds.pointBackgroundColor = cssVar('--surface');
  });
  chart.update('none');
}

/* ---------------- CSV 書き出し ---------------- */
function csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function toCSV(headers, rows) {
  const lines = [headers.map(csvEscape).join(',')];
  rows.forEach(r => lines.push(r.map(csvEscape).join(',')));
  return lines.join('\n');
}
function downloadFile(filename, content, mime = 'text/csv;charset=utf-8') {
  // BOM付与でExcelの文字化けを防ぐ
  const blob = new Blob(['\uFEFF' + content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ---------------- モーダル制御 ---------------- */
const Modal = (() => {
  const overlay = document.getElementById('modal');
  const titleEl = document.getElementById('modalTitle');
  const bodyEl = document.getElementById('modalBody');
  const saveBtn = document.getElementById('modalSave');
  let onSave = null;

  overlay.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', close));
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

  function open({ title, bodyHTML, onSave: cb, saveLabel = '保存' }) {
    titleEl.textContent = title;
    bodyEl.innerHTML = bodyHTML;
    saveBtn.textContent = saveLabel;
    saveBtn.style.display = cb ? '' : 'none';
    onSave = cb;
    overlay.classList.add('open');
    return bodyEl;
  }
  function close() { overlay.classList.remove('open'); onSave = null; }

  saveBtn.onclick = () => { if (onSave && onSave(bodyEl) !== false) close(); };
  return { open, close, get body() { return bodyEl; } };
})();

/* =====================================================================
 *  AI連携: Cloudflare Workersプロキシ経由でClaude API(Messages)を呼ぶ
 *  - APIキーはWorker側Secretにあり、ブラウザには存在しない
 * ===================================================================== */
const AI = (() => {
  function conf() { return UserSettings.state.ai || {}; }
  function enabled() { return !!(conf().proxyUrl || '').trim(); }

  async function chat({ system, messages, maxTokens = 1024 }) {
    const url = (conf().proxyUrl || '').trim();
    if (!url) { const e = new Error('AI未設定'); e.code = 'NO_PROXY'; throw e; }
    const headers = { 'content-type': 'application/json' };
    const token = (conf().appToken || '').trim();
    if (token) headers['x-tralog-key'] = token;
    let res;
    try {
      res = await fetch(url, { method: 'POST', headers, body: JSON.stringify({ system, messages, max_tokens: maxTokens }) });
    } catch (e) { throw new Error('通信エラー（オフライン or URL誤り）'); }
    let data = null;
    try { data = await res.json(); } catch (_) {}
    if (!res.ok || data?.error) throw new Error(data?.error?.message || `HTTP ${res.status}`);
    return (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
  }

  // 画像を縮小+JPEG化してAPIのimageブロックに（通信量・トークン節約）
  function fileToImageBlock(file, maxDim = 1400, quality = 0.85) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const u = URL.createObjectURL(file);
      img.onload = () => {
        try {
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const canvas = document.createElement('canvas');
          canvas.width = Math.max(1, Math.round(img.width * scale));
          canvas.height = Math.max(1, Math.round(img.height * scale));
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: dataUrl.split(',')[1] } });
        } catch (e) { reject(e); }
        finally { URL.revokeObjectURL(u); }
      };
      img.onerror = () => { URL.revokeObjectURL(u); reject(new Error('画像を読み込めませんでした')); };
      img.src = u;
    });
  }

  // 応答テキストからJSONを頑健に取り出す
  function parseJSON(text) {
    const clean = String(text).replace(/```json|```/g, '').trim();
    const m = clean.match(/\{[\s\S]*\}/);
    return JSON.parse(m ? m[0] : clean);
  }

  return { enabled, chat, fileToImageBlock, parseJSON };
})();

/* =====================================================================
 *  App: モジュールレジストリ + タブ
 * ===================================================================== */
const App = (() => {
  const modules = [];
  let active = null;
  const tabbar = document.getElementById('tabbar');
  const view = document.getElementById('view');

  function registerModule(mod) { modules.push(mod); }

  function renderTabs() {
    tabbar.innerHTML = '';
    modules.forEach(mod => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (mod.id === active ? ' active' : '');
      btn.innerHTML = `<span class="tab-ico">${mod.icon || ''}</span><span class="tab-lbl">${mod.label}</span>` +
        (mod.comingSoon ? ' <span class="soon">準備中</span>' : '');
      btn.onclick = () => activate(mod.id);
      tabbar.appendChild(btn);
    });
  }

  function activate(id) {
    active = id;
    renderTabs();
    view.innerHTML = '';
    const mod = modules.find(m => m.id === id);
    const el = document.createElement('div');
    el.className = 'module-view';
    view.appendChild(el);
    mod.render(el);
  }

  function start() {
    if (modules.length) activate(modules[0].id);
  }
  return { registerModule, start, rerender: () => active && activate(active) };
})();

/* =====================================================================
 *  Workout Module
 * ===================================================================== */
const WorkoutModule = (() => {
  const state = Store.ns('workout', { records: {}, customMenus: [] });
  if (!state.routines) state.routines = [];
  let viewMonth = new Date(); viewMonth.setDate(1);
  let selectedKey = dateKey(new Date());
  let rootEl = null;

  /* --- メニュー取得（ビルトイン + オリジナル） --- */
  function menusOf(catId) {
    const customs = state.customMenus.filter(m => m.category === catId);
    return [...builtinMenus(catId), ...customs];
  }
  function findMenu(catId, menuId) {
    return menusOf(catId).find(m => m.id === menuId);
  }

  /* --- レコード操作 --- */
  function recordsOf(key) { return state.records[key] || []; }
  function addRecord(key, rec) {
    if (!state.records[key]) state.records[key] = [];
    state.records[key].push(rec);
    Store.save();
  }
  function updateRecord(key, rec) {
    const list = state.records[key] || [];
    const i = list.findIndex(r => r.id === rec.id);
    if (i >= 0) list[i] = rec;
    Store.save();
  }
  function deleteRecord(key, id) {
    state.records[key] = recordsOf(key).filter(r => r.id !== id);
    if (!state.records[key].length) delete state.records[key];
    Store.save();
  }

  /* --- 履歴集計（種目別） --- */
  function allRecordsForMenu(menuId) {
    const out = [];
    Object.entries(state.records).forEach(([key, list]) =>
      list.forEach(r => { if (r.menuId === menuId) out.push({ date: key, ...r }); }));
    return out.sort((a, b) => a.date.localeCompare(b.date));
  }
  function lastRecordForMenu(menuId, beforeKey) {
    const all = allRecordsForMenu(menuId).filter(r => !beforeKey || r.date < beforeKey);
    return all.length ? all[all.length - 1] : null;
  }
  // 記録のある全メニューを {menuId, menuName, category, type, count} で返す
  function loggedMenus() {
    const map = {};
    Object.values(state.records).forEach(list => list.forEach(r => {
      if (!map[r.menuId]) map[r.menuId] = { menuId: r.menuId, menuName: r.menuName, category: r.category, type: r.type, count: 0 };
      map[r.menuId].count++;
    }));
    return Object.values(map).sort((a, b) => b.count - a.count);
  }
  function summarizeRecord(r) {
    if (r.type === 'cardio') {
      const parts = [];
      if (r.duration != null) parts.push(`${r.duration}分`);
      if (r.distance != null) parts.push(`${r.distance}km`);
      if (r.intensity) parts.push(`強度${r.intensity}`);
      return parts.join(' / ') || '記録あり';
    }
    const sets = r.sets || [];
    return sets.map(s => `${s.weight ?? 0}kg×${s.reps ?? 0}`).join(', ') || 'セット未入力';
  }

  let statsMenuId = null;
  let statsRange = 'all';

  /* ============ 描画: 全体 ============ */
  function render(el) {
    rootEl = el;
    el.innerHTML = `
      <div class="panel" id="todayPanel"></div>
      <div class="panel" id="heroPanel"></div>
      <div class="panel" id="calPanel"></div>
      <div class="panel" id="heatPanel"></div>
      <div class="panel" id="statsPanel"></div>
    `;

    renderHero();
    renderCalendar();
    renderHeatmap();
    renderStats();

  /* ============ 描画: 今日パネル（開いた瞬間に今日やることが分かる） ============ */
  function renderToday() {
    const panel = rootEl.querySelector('#todayPanel');
    if (!panel) return;
    const d = new Date();
    const todayKey = dateKey(d);
    const wd = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
    const todayRecs = recordsOf(todayKey);
    const a = analysis();

    let msg, done = false;
    if (todayRecs.length) {
      done = true;
      const cats = [...new Set(todayRecs.map(r => catById(r.category).name))];
      const sets = todayRecs.reduce((n, r) => n + (r.sets || []).length, 0);
      msg = `${cats.join('・')} を記録済み（${sets}セット）。おつかれさまです💪`;
    } else {
      const cats = Object.entries(a.catStats).filter(([id]) => id !== 'cardio' && id !== 'other');
      if (cats.length) {
        const sorted = cats.sort((x, y) => String(x[1].lastDate).localeCompare(String(y[1].lastDate)));
        const names = sorted.slice(0, 2).map(([id]) => catById(id).name);
        const top = a.progress.find(p => p.category === sorted[0][0]);
        msg = `今日のおすすめは「${names.join('・')}」` + (top && top.last.topWeight ? `<br><span class="today-sub">前回の${escapeHTML(top.name)}: ${top.last.topWeight}kg → ${top.advice === 'up' ? `今日は${top.nextWeight}kgに挑戦！` : top.advice === 'down' ? `${top.nextWeight}kg前後で回数重視` : '同重量で+1回を狙おう'}</span>` : '');
      } else {
        msg = 'ようこそ！まずは今日のトレーニングを1件記録してみましょう';
      }
    }

    panel.innerHTML = `
      <div class="today-card${done ? ' done' : ''}">
        <div class="today-date">今日 ${d.getMonth() + 1}/${d.getDate()}（${wd}）</div>
        <div class="today-msg">${msg}</div>
        <button class="btn today-btn" id="todayAdd">＋ ${done ? '記録を追加する' : '今日のトレーニングを記録'}</button>
      </div>`;
    panel.querySelector('#todayAdd').onclick = () => { selectedKey = todayKey; openRecordModal(null); };
  }

  /* ============ 描画: 年間アクティビティヒートマップ ============ */
  function renderHeatmap() {
    const panel = rootEl.querySelector('#heatPanel');
    if (!panel) return;
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const todayKey = dateKey(today);

    // 日ごとのスコア = 筋トレの実施セット数 + 有酸素1件につき3
    const score = {};
    Object.entries(state.records).forEach(([k, list]) => {
      let s = 0;
      list.forEach(r => {
        if (r.type === 'cardio') s += 3;
        else s += (r.sets || []).filter(x => (x.weight || 0) > 0 || (x.reps || 0) > 0).length || 1;
      });
      if (s > 0) score[k] = s;
    });
    const lvl = v => v <= 0 ? 0 : v <= 5 ? 1 : v <= 11 ? 2 : v <= 19 ? 3 : 4;

    // 過去52週。週の先頭は日曜
    const start = new Date(today);
    start.setDate(start.getDate() - 364);
    start.setDate(start.getDate() - start.getDay());

    const cols = [];
    let lastM = -1;
    const cur = new Date(start);
    while (cur <= today) {
      const days = [];
      for (let i = 0; i < 7; i++) { const d = new Date(cur); d.setDate(cur.getDate() + i); days.push(d); }
      const m = days[0].getMonth();
      cols.push({ days, label: m !== lastM ? `${m + 1}月` : '' });
      lastM = m;
      cur.setDate(cur.getDate() + 7);
    }

    let activeDays = 0;
    const gridHTML = cols.map(col => `<div class="hm-col">${col.days.map(d => {
      const key = dateKey(d);
      if (key > todayKey) return `<span class="hm-cell future"></span>`;
      const v = score[key] || 0;
      if (v > 0) activeDays++;
      const has = state.records[key]?.length ? '1' : '0';
      return `<span class="hm-cell l${lvl(v)}" data-key="${key}" data-has="${has}" title="${key}${v ? `：${v}セット相当` : ''}"></span>`;
    }).join('')}</div>`).join('');

    panel.innerHTML = `
      <div class="stats-head">
        <h2>🔥 アクティビティ</h2>
        <span class="hint">過去1年で <b style="color:var(--primary)">${activeDays}</b> 日トレーニング</span>
      </div>
      <div class="heatmap-scroll" id="hmScroll">
        <div class="hm-months">${cols.map(c => `<span>${c.label}</span>`).join('')}</div>
        <div class="hm-grid">${gridHTML}</div>
        <div class="hm-legend">少 <span class="hm-cell l0"></span><span class="hm-cell l1"></span><span class="hm-cell l2"></span><span class="hm-cell l3"></span><span class="hm-cell l4"></span> 多</div>
      </div>`;

    // 記録のある日をタップ → その日の詳細モーダル
    panel.querySelectorAll('.hm-cell[data-has="1"]').forEach(c => c.onclick = () => {
      selectedKey = c.dataset.key;
      openDayModal(selectedKey);
    });
    // 直近(右端)を初期表示
    const sc = panel.querySelector('#hmScroll');
    sc.scrollLeft = sc.scrollWidth;
  }

  /* ============ 描画: モチベーションヒーロー ============ */
  function renderHero() {
    const panel = rootEl.querySelector('#heroPanel');
    const today = new Date();
    const todayKey = dateKey(today);
    const allKeys = Object.keys(state.records).sort();

    // 今月の実績
    const ym = todayKey.slice(0, 7);
    const monthDays = allKeys.filter(k => k.startsWith(ym));
    let monthVolume = 0, monthSets = 0;
    monthDays.forEach(k => state.records[k].forEach(r => (r.sets || []).forEach(s => {
      monthVolume += (s.weight || 0) * (s.reps || 0); monthSets++;
    })));

    // 週ストリーク（月曜始まりで連続何週トレーニングしたか）
    const weekStart = d => { const t = new Date(d); t.setDate(t.getDate() - (t.getDay() + 6) % 7); return dateKey(t); };
    const weeks = new Set(allKeys.map(k => { const [y, m, d] = k.split('-').map(Number); return weekStart(new Date(y, m - 1, d)); }));
    let streak = 0;
    { const c = new Date(); c.setDate(c.getDate() - (c.getDay() + 6) % 7);
      while (weeks.has(dateKey(c))) { streak++; c.setDate(c.getDate() - 7); } }

    // 前回トレーニングからの日数
    let lastGap = null;
    if (allKeys.length) {
      const [y, m, d] = allKeys[allKeys.length - 1].split('-').map(Number);
      lastGap = Math.max(0, Math.round((new Date(today.getFullYear(), today.getMonth(), today.getDate()) - new Date(y, m - 1, d)) / 86400000));
    }

    const volDisp = monthVolume >= 1000 ? { v: round(monthVolume / 1000, 1), u: 't' } : { v: monthVolume, u: 'kg' };
    panel.innerHTML = `
      <div class="hero-stats">
        <div class="hero-stat"><div class="hs-lbl">週ストリーク</div><div class="hs-val">${streak}<small> 週</small></div></div>
        <div class="hero-stat"><div class="hs-lbl">今月のトレ日数</div><div class="hs-val">${monthDays.length}<small> 日</small></div></div>
        <div class="hero-stat"><div class="hs-lbl">今月の総ボリューム</div><div class="hs-val">${volDisp.v}<small> ${volDisp.u}</small></div></div>
        <div class="hero-stat"><div class="hs-lbl">今月のセット数</div><div class="hs-val">${monthSets}<small> set</small></div></div>
      </div>`;
  }

  /* ============ 描画: カレンダー ============ */
  function renderCalendar() {
    const panel = rootEl.querySelector('#calPanel');
    const y = viewMonth.getFullYear(), m = viewMonth.getMonth();
    const first = new Date(y, m, 1);
    const startDay = first.getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const todayKey = dateKey(new Date());

    let cells = '';
    for (let i = 0; i < startDay; i++) cells += `<div class="cal-cell empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dt = new Date(y, m, d);
      const key = dateKey(dt);
      const dow = dt.getDay();
      const recs = recordsOf(key);
      const cats = [...new Set(recs.map(r => r.category))];
      const dots = cats.map(c => `<span class="dot" style="background:${catById(c).color}"></span>`).join('');
      const cls = ['cal-cell'];
      if (dow === 0) cls.push('sun');
      if (dow === 6) cls.push('sat');
      if (key === todayKey) cls.push('today');
      cells += `
        <div class="${cls.join(' ')}" data-key="${key}">
          <span class="daynum">${d}</span>
          <div class="dots">${dots}</div>
          ${recs.length ? `<span class="cell-count">${recs.length}件</span>` : ''}
        </div>`;
    }

    const legend = CATEGORIES.map(c =>
      `<span class="legend-item"><span class="dot" style="background:${c.color}"></span>${c.name}</span>`
    ).join('');

    panel.innerHTML = `
      <div class="cal-head">
        <div class="cal-title">${y}年 ${m + 1}月</div>
        <div class="cal-nav">
          <button class="icon-btn" id="prevM">‹</button>
          <button class="btn ghost sm" id="todayBtn">今日</button>
          <button class="icon-btn" id="nextM">›</button>
        </div>
      </div>
      <div class="weekdays">
        ${WEEK_JP.map((w, i) => `<span class="${i === 0 ? 'sun' : i === 6 ? 'sat' : ''}">${w}</span>`).join('')}
      </div>
      <div class="cal-grid">${cells}</div>
      <div class="legend">${legend}</div>
      <div class="toolbar">
        <button class="btn ghost sm" id="exportBtn">データエクスポート</button>
      </div>
    `;

    panel.querySelector('#prevM').onclick = () => { viewMonth.setMonth(m - 1); renderCalendar(); };
    panel.querySelector('#nextM').onclick = () => { viewMonth.setMonth(m + 1); renderCalendar(); };
    panel.querySelector('#todayBtn').onclick = () => {
      viewMonth = new Date(); viewMonth.setDate(1);
      selectedKey = dateKey(new Date());
      renderCalendar();
    };
    panel.querySelector('#exportBtn').onclick = exportData;
    panel.querySelectorAll('.cal-cell[data-key]').forEach(cell => bindCellGestures(cell));
  }

  // タップ=記録ポップアップ / 長押し（or 右クリック）=記録記入
  function bindCellGestures(cell) {
    const key = cell.dataset.key;
    let timer = null, longFired = false, moved = false;
    const LONG_MS = 450;

    const showDay = () => { openDayModal(key); };
    const quickAdd = () => {
      longFired = true;
      if (navigator.vibrate) navigator.vibrate(15);
      selectedKey = key;
      openRecordModal(null);
    };
    const startTimer = () => { longFired = false; moved = false; timer = setTimeout(quickAdd, LONG_MS); };
    const clearTimer = () => { if (timer) { clearTimeout(timer); timer = null; } };

    // タッチ操作
    cell.addEventListener('touchstart', startTimer, { passive: true });
    cell.addEventListener('touchmove', () => { moved = true; clearTimer(); }, { passive: true });
    cell.addEventListener('touchend', e => {
      clearTimer();
      if (longFired) { e.preventDefault(); return; }
      if (!moved) { e.preventDefault(); showDay(); }
    });
    // マウス操作（長押し対応）
    cell.addEventListener('mousedown', e => { if (e.button === 0) startTimer(); });
    cell.addEventListener('mouseup', () => clearTimer());
    cell.addEventListener('mouseleave', () => clearTimer());
    cell.addEventListener('click', () => { if (!longFired) showDay(); });
    // 右クリックでも記録記入
    cell.addEventListener('contextmenu', e => { e.preventDefault(); clearTimer(); selectedKey = key; openRecordModal(null); });
  }

  /* ============ 日別記録ポップアップ ============ */
  function openDayModal(key) {
    selectedKey = key;
    const [yy, mm, dd] = key.split('-').map(Number);
    const dt = new Date(yy, mm - 1, dd);
    Modal.open({
      title: `${mm}月${dd}日（${WEEK_JP[dt.getDay()]}）`,
      onSave: null,
      bodyHTML: '<div id="dayModalBody"></div>',
    });
    renderDayModalBody();
  }

  function renderDayModalBody() {
    const box = Modal.body.querySelector('#dayModalBody');
    if (!box) return;
    const recs = recordsOf(selectedKey);
    let html;
    if (!recs.length) {
      html = `<div class="empty-state"><div class="big">□</div>この日の記録はまだありません。</div>`;
    } else {
      const groups = {};
      recs.forEach(r => { (groups[r.category] ||= []).push(r); });
      html = CATEGORIES.filter(c => groups[c.id]).map(c => `
        <div class="cat-group">
          <div class="cat-group-head"><span class="cat-badge" style="background:${c.color}"></span>${c.name}</div>
          ${groups[c.id].map(r => renderExCard(r)).join('')}
        </div>`).join('');
    }
    box.innerHTML = html + `<button class="btn block" id="dayAddBtn" style="margin-top:10px;">＋ 記録を追加</button>`;
    box.querySelector('#dayAddBtn').onclick = () => openRecordModal(null, { backToDay: true });
    box.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openRecordModal(b.dataset.edit, { backToDay: true }));
    box.querySelectorAll('[data-del]').forEach(b => b.onclick = () => {
      if (!confirm('この記録を削除しますか？')) return;
      deleteRecord(selectedKey, b.dataset.del);
      renderToday(); renderHero(); renderCalendar(); renderHeatmap(); renderStats();
      renderDayModalBody();
      toast('削除しました');
    });
  }

  function renderExCard(r) {
    let detail = '';
    if (r.type === 'cardio') {
      const chips = [];
      if (r.duration) chips.push(`<span class="set-chip"><b>${r.duration}</b> 分</span>`);
      if (r.distance) chips.push(`<span class="set-chip"><b>${r.distance}</b> km</span>`);
      if (r.intensity) chips.push(`<span class="set-chip">強度 <b>${r.intensity}</b></span>`);
      detail = `<div class="ex-sets">${chips.join('') || '<span class="set-chip">記録あり</span>'}</div>`;
    } else {
      const chips = (r.sets || []).map((s, i) =>
        `<span class="set-chip">${i + 1}set <b>${s.weight || 0}</b>kg × <b>${s.reps || 0}</b></span>`
      ).join('');
      detail = `<div class="ex-sets">${chips || '<span class="set-chip">セット未入力</span>'}</div>`;
    }
    return `
      <div class="ex-card">
        <div class="ex-card-head">
          <span class="ex-name">${escapeHTML(r.menuName)}</span>
          <span class="ex-actions">
            <button class="link-btn" data-edit="${r.id}">編集</button>
            <button class="link-btn del" data-del="${r.id}">削除</button>
          </span>
        </div>
        ${detail}
        ${r.memo ? `<div class="ex-memo">💬 ${escapeHTML(r.memo)}</div>` : ''}
      </div>`;
  }

  /* ============ 描画: ルーティンメニュー ============ */
  function renderRoutines() {
    const panel = rootEl.querySelector('#routinePanel');
    if (!panel) return;
    const rows = state.routines.map(rt => `
      <div class="routine-row">
        <div>
          <div class="routine-title">${escapeHTML(rt.name)}</div>
          <div class="routine-meta">${rt.items.length}種目 ・ ${rt.items.map(i => escapeHTML(i.menuName)).join(' / ')}</div>
        </div>
        <div class="ex-actions">
          <button class="btn sm" data-use-routine="${rt.id}">今日に追加</button>
          <button class="link-btn" data-edit-routine="${rt.id}">編集</button>
          <button class="link-btn del" data-del-routine="${rt.id}">削除</button>
        </div>
      </div>`).join('');

    panel.innerHTML = `
      <div class="stats-head">
        <h2 style="font-size:16px;">ルーティンメニュー</h2>
      </div>
      ${state.routines.length ? `<div class="routine-list">${rows}</div>` : `<p class="hint">よく行う組み合わせを登録すると、今日の記録へまとめて追加できます。</p>`}`;

    panel.querySelectorAll('[data-use-routine]').forEach(b => b.onclick = () => applyRoutine(b.dataset.useRoutine));
    panel.querySelectorAll('[data-edit-routine]').forEach(b => b.onclick = () => openRoutineModal(b.dataset.editRoutine));
    panel.querySelectorAll('[data-del-routine]').forEach(b => b.onclick = () => {
      if (!confirm('このルーティンを削除しますか？')) return;
      state.routines = state.routines.filter(r => r.id !== b.dataset.delRoutine);
      Store.save();
      renderRoutines();
      toast('削除しました');
    });
  }

  function applyRoutine(id) {
    const rt = state.routines.find(r => r.id === id);
    if (!rt || !rt.items.length) return;
    const key = dateKey(new Date());
    rt.items.forEach(item => {
      const rec = {
        id: uid(),
        category: item.category,
        menuId: item.menuId,
        menuName: item.menuName,
        type: item.type,
        memo: `Routine: ${rt.name}`,
      };
      if (item.type === 'cardio') {
        rec.duration = item.duration ?? null;
        rec.distance = item.distance ?? null;
        rec.intensity = item.intensity || '';
      } else {
        const count = Math.max(1, Number(item.setCount || 3));
        rec.sets = Array.from({ length: count }, () => ({
          weight: item.weight ?? null,
          reps: item.reps ?? null,
        }));
      }
      addRecord(key, rec);
    });
    selectedKey = key;
    renderToday(); renderHero(); renderCalendar(); renderHeatmap(); renderStats();
    toast(`${rt.name}を今日の記録に追加しました`);
  }

  function openRoutineModal(editId) {
    const editing = editId ? state.routines.find(r => r.id === editId) : null;
    Modal.open({
      title: editing ? 'ルーティンを編集' : 'ルーティンを作成',
      saveLabel: editing ? '更新' : '保存',
      bodyHTML: `
        <div class="field">
          <label class="field-label">ルーティン名</label>
          <input id="routineName" placeholder="例: Push Day / 脚の日" value="${editing ? escapeHTML(editing.name) : ''}">
        </div>
        <div class="routine-editor" id="routineEditor"></div>
        <button type="button" class="btn ghost sm" id="routineAddExercise">＋ 種目を追加</button>`,
      onSave: (body) => {
        const name = body.querySelector('#routineName').value.trim();
        if (!name) { toast('ルーティン名を入力してください'); return false; }
        const items = [...body.querySelectorAll('.routine-ex-row')].map(row => routineRowToItem(row)).filter(Boolean);
        if (!items.length) { toast('種目を1つ以上追加してください'); return false; }
        const next = { id: editing?.id || uid(), name, items, updatedAt: new Date().toISOString() };
        if (editing) {
          const idx = state.routines.findIndex(r => r.id === editing.id);
          state.routines[idx] = next;
        } else {
          state.routines.push(next);
        }
        Store.save();
        renderRoutines();
        toast(editing ? 'ルーティンを更新しました' : 'ルーティンを保存しました');
      },
    });

    const editor = Modal.body.querySelector('#routineEditor');
    const initial = editing?.items?.length ? editing.items : [{ category: 'chest', type: 'strength', setCount: 3, reps: 10 }];
    initial.forEach(item => addRoutineRow(editor, item));
    Modal.body.querySelector('#routineAddExercise').onclick = () => addRoutineRow(editor, { category: 'chest', type: 'strength', setCount: 3, reps: 10 });
  }

  function addRoutineRow(editor, item) {
    const row = document.createElement('div');
    row.className = 'routine-ex-row';
    row.innerHTML = `
      <div class="routine-ex-grid">
        <div><label class="hint">カテゴリー</label><select class="rt-cat"></select></div>
        <div><label class="hint">メニュー</label><select class="rt-menu"></select></div>
      </div>
      <div class="routine-detail"></div>
      <button type="button" class="link-btn del" style="justify-self:start;">この種目を削除</button>`;
    editor.appendChild(row);

    const cat = row.querySelector('.rt-cat');
    cat.innerHTML = CATEGORIES.map(c => `<option value="${c.id}" ${c.id === item.category ? 'selected' : ''}>${c.name}</option>`).join('');
    cat.onchange = () => { fillRoutineMenus(row); renderRoutineDetail(row); };
    row.querySelector('.del').onclick = () => row.remove();
    fillRoutineMenus(row, item);
    renderRoutineDetail(row, item);
  }

  function fillRoutineMenus(row, item = {}) {
    const catId = row.querySelector('.rt-cat').value;
    const menu = row.querySelector('.rt-menu');
    const menus = menusOf(catId);
    menu.innerHTML = menus.map(m => `<option value="${m.id}" ${m.id === item.menuId ? 'selected' : ''}>${escapeHTML(m.name)}</option>`).join('');
    menu.onchange = () => renderRoutineDetail(row);
  }

  function routineMenuFromRow(row) {
    const catId = row.querySelector('.rt-cat').value;
    const menuId = row.querySelector('.rt-menu').value;
    return menusOf(catId).find(m => m.id === menuId);
  }

  function renderRoutineDetail(row, item = {}) {
    const menu = routineMenuFromRow(row);
    const detail = row.querySelector('.routine-detail');
    if (!menu) { detail.innerHTML = ''; return; }
    if (menu.type === 'cardio') {
      detail.innerHTML = `
        <div class="routine-ex-grid">
          <div><label class="hint">時間(分)</label><input class="rt-duration" type="number" min="0" value="${item.duration ?? ''}" placeholder="30"></div>
          <div><label class="hint">距離(km)</label><input class="rt-distance" type="number" min="0" step="0.1" value="${item.distance ?? ''}" placeholder="5.0"></div>
        </div>
        <div style="margin-top:8px;"><label class="hint">強度</label><select class="rt-intensity">
          ${['', '低', '中', '高'].map(v => `<option value="${v}" ${item.intensity === v ? 'selected' : ''}>${v || '—'}</option>`).join('')}
        </select></div>`;
    } else {
      detail.innerHTML = `
        <div class="routine-ex-grid" style="grid-template-columns:repeat(3,1fr);">
          <div><label class="hint">セット数</label><input class="rt-set-count" type="number" min="1" value="${item.setCount ?? 3}"></div>
          <div><label class="hint">重量(kg)</label><input class="rt-weight" type="number" min="0" step="0.5" value="${item.weight ?? ''}" placeholder="任意"></div>
          <div><label class="hint">回数</label><input class="rt-reps" type="number" min="0" value="${item.reps ?? 10}"></div>
        </div>`;
    }
  }

  function routineRowToItem(row) {
    const catId = row.querySelector('.rt-cat').value;
    const menu = routineMenuFromRow(row);
    if (!menu) return null;
    const item = { category: catId, menuId: menu.id, menuName: menu.name, type: menu.type };
    if (menu.type === 'cardio') {
      item.duration = numOrNull(row.querySelector('.rt-duration')?.value);
      item.distance = numOrNull(row.querySelector('.rt-distance')?.value);
      item.intensity = row.querySelector('.rt-intensity')?.value || '';
    } else {
      item.setCount = numOrNull(row.querySelector('.rt-set-count')?.value) || 3;
      item.weight = numOrNull(row.querySelector('.rt-weight')?.value);
      item.reps = numOrNull(row.querySelector('.rt-reps')?.value) || 10;
    }
    return item;
  }

  /* ============ 描画: 種目別 分析 ============ */
  function renderStats() {
    const panel = rootEl.querySelector('#statsPanel');
    const menus = loggedMenus();
    if (!menus.length) {
      panel.innerHTML = `<div class="stats-head"><h2>📈 種目別の推移</h2></div>
        <div class="empty-state">記録を追加すると、種目ごとの重量やボリュームの推移グラフが表示されます。</div>`;
      return;
    }
    if (!statsMenuId || !menus.find(m => m.menuId === statsMenuId)) statsMenuId = menus[0].menuId;

    panel.innerHTML = `
      <div class="stats-head">
        <h2>📈 種目別の推移</h2>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <select id="statsSel" style="width:auto; min-width:200px;">
            ${menus.map(m => `<option value="${m.menuId}" ${m.menuId === statsMenuId ? 'selected' : ''}>${escapeHTML(m.menuName)}（${m.count}回）</option>`).join('')}
          </select>
          <div class="range-toggle">
            <button data-range="3m" class="${statsRange === '3m' ? 'active' : ''}">3ヶ月</button>
            <button data-range="all" class="${statsRange === 'all' ? 'active' : ''}">全期間</button>
          </div>
        </div>
      </div>
      <div id="statsBody"></div>`;

    panel.querySelector('#statsSel').onchange = e => { statsMenuId = e.target.value; renderStats(); };
    panel.querySelectorAll('[data-range]').forEach(b => b.onclick = () => { statsRange = b.dataset.range; renderStats(); });

    let recs = allRecordsForMenu(statsMenuId);
    if (statsRange === '3m') {
      const cut = new Date(); cut.setMonth(cut.getMonth() - 3);
      const cutKey = dateKey(cut);
      recs = recs.filter(r => r.date >= cutKey);
    }
    const isCardio = (menus.find(m => m.menuId === statsMenuId) || {}).type === 'cardio';
    const body = panel.querySelector('#statsBody');

    if (recs.length < 1) { body.innerHTML = `<div class="empty-state">この期間の記録がありません。</div>`; return; }

    const labels = recs.map(r => fmtMonthDay(r.date));
    let cards = '', chartCfg, tableHTML;

    if (isCardio) {
      const dur = recs.map(r => r.duration ?? null);
      const dist = recs.map(r => r.distance ?? null);
      const totalDur = dur.reduce((a, b) => a + (b || 0), 0);
      const totalDist = dist.reduce((a, b) => a + (b || 0), 0);
      cards = statCard('記録回数', recs.length, '回') + statCard('合計時間', totalDur, '分') + statCard('合計距離', round(totalDist, 1), 'km');
      chartCfg = {
        type: 'line',
        data: { labels, datasets: [
          { label: '時間(分)', data: dur, borderColor: cssVar('--primary'), backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y', spanGaps: true },
          { label: '距離(km)', data: dist, borderColor: cssVar('--cat-back'), backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y1', spanGaps: true },
        ] },
        options: { plugins: { zoom: zoomOpts(labels.length - 1) }, scales: { x: { min: recentStartIndex(recs.map(r => r.date)), ticks: edgeXTicks(labels.length) }, y: { position: 'left', title: { display: true, text: '分', color: cssVar('--muted') } }, y1: { position: 'right', title: { display: true, text: 'km', color: cssVar('--muted') }, grid: { drawOnChartArea: false } } } },
      };
      tableHTML = `<table class="data-table"><thead><tr><th>日付</th><th>時間(分)</th><th>距離(km)</th><th>強度</th></tr></thead>
        <tbody>${[...recs].reverse().map(r => `<tr><td>${fmtMonthDay(r.date)}</td><td>${r.duration ?? '-'}</td><td>${r.distance ?? '-'}</td><td>${r.intensity || '-'}</td></tr>`).join('')}</tbody></table>`;
    } else {
      const maxW = recs.map(r => Math.max(0, ...(r.sets || []).map(s => s.weight || 0)) || null);
      const vol = recs.map(r => (r.sets || []).reduce((a, s) => a + (s.weight || 0) * (s.reps || 0), 0) || null);
      const e1rm = recs.map(r => { const best = Math.max(0, ...(r.sets || []).map(s => (s.weight || 0) * (1 + (s.reps || 0) / 30))); return best ? round(best, 1) : null; });
      const curMax = maxW.filter(v => v != null).slice(-1)[0];
      const firstMax = maxW.filter(v => v != null)[0];
      cards = statCard('最新の最大重量', curMax, 'kg', curMax != null && firstMax != null ? curMax - firstMax : null) +
              statCard('最新ボリューム', vol.filter(v => v != null).slice(-1)[0], 'kg') +
              statCard('推定1RM', e1rm.filter(v => v != null).slice(-1)[0], 'kg') +
              statCard('記録回数', recs.length, '回');
      chartCfg = {
        type: 'line',
        data: { labels, datasets: [
          { label: '最大重量(kg)', data: maxW, borderColor: cssVar('--primary'), backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y', spanGaps: true },
          { label: '推定1RM(kg)', data: e1rm, borderColor: cssVar('--cat-leg'), backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y', spanGaps: true, borderDash: [2, 3] },
          { label: 'ボリューム(kg)', data: vol, borderColor: cssVar('--cat-glute'), backgroundColor: 'transparent', borderDash: [5, 4], tension: 0.3, yAxisID: 'y1', spanGaps: true },
        ] },
        options: { plugins: { zoom: zoomOpts(labels.length - 1) }, scales: { x: { min: recentStartIndex(recs.map(r => r.date)), ticks: edgeXTicks(labels.length) }, y: { position: 'left', title: { display: true, text: 'kg', color: cssVar('--muted') } }, y1: { position: 'right', grid: { drawOnChartArea: false } } } },
      };
      tableHTML = `<table class="data-table"><thead><tr><th>日付</th><th>最大重量</th><th>ボリューム</th><th>セット詳細</th></tr></thead>
        <tbody>${[...recs].reverse().map((r, i) => {
          const mw = Math.max(0, ...(r.sets || []).map(s => s.weight || 0));
          const v = (r.sets || []).reduce((a, s) => a + (s.weight || 0) * (s.reps || 0), 0);
          return `<tr><td>${fmtMonthDay(r.date)}</td><td>${mw || '-'}kg</td><td>${v || '-'}</td><td style="text-align:left;color:var(--muted)">${escapeHTML(summarizeRecord(r))}</td></tr>`;
        }).join('')}</tbody></table>`;
    }

    body.innerHTML = `<div class="stat-cards">${cards}</div>
      <div class="chart-wrap"><canvas id="statsChart"></canvas></div>
      <div class="table-scroll">${tableHTML}</div>`;
    Charts.draw('statsChart', chartCfg);
  }

  function statCard(lbl, val, unit, delta) {
    let deltaHTML = '';
    if (delta != null && Number.isFinite(delta)) {
      const cls = delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat';
      const sign = delta > 0 ? '▲ +' : delta < 0 ? '▼ ' : '± ';
      deltaHTML = `<div class="delta ${cls}">${sign}${round(Math.abs(delta), 1)}${unit}</div>`;
    }
    return `<div class="stat-card"><div class="lbl">${lbl}</div><div class="val">${val ?? '-'}<small> ${unit}</small></div>${deltaHTML}</div>`;
  }

  /* ============ 記録 追加/編集 モーダル ============ */
  function openRecordModal(editId, opts = {}) {
    const editing = editId ? recordsOf(selectedKey).find(r => r.id === editId) : null;
    // 選択状態（モーダル内ローカル）
    let sel = {
      category: editing?.category || 'chest',
      menuId: editing?.menuId || null,
      menuName: editing?.menuName || '',
      type: editing?.type || 'strength',
    };

    Modal.open({
      title: editing ? 'トレーニングを編集' : 'トレーニングを追加',
      saveLabel: editing ? '更新' : '追加',
      bodyHTML: `
        <div class="field">
          <button type="button" class="btn ghost sm" id="routineFromRecord">＋ ルーティン作成</button>
          ${state.routines.length ? `<select id="routineUseSelect" style="margin-top:8px;">
            <option value="">ルーティンを今日に追加</option>

          <textarea id="recMemo" rows="2" placeholder="調子・フォームの気づきなど">${editing?.memo ? escapeHTML(editing.memo) : ''}</textarea>
        </div>
      `,
      onSave: (body) => {
        if (!sel.menuId) { toast('メニューを選択してください'); return false; }
        const rec = {
          id: editing?.id || uid(),
          category: sel.category,
          menuId: sel.menuId,
          menuName: sel.menuName,

      },
    });

    const body = Modal.body;
    const catChips = body.querySelector('#catChips');

    const detailArea = body.querySelector('#detailArea');
    body.querySelector('#routineFromRecord').onclick = () => openRoutineModal(null);
    const routineSelect = body.querySelector('#routineUseSelect');

      if (!routineSelect.value) return;
      applyRoutine(routineSelect.value);
      Modal.close();
    };

    // カテゴリーチップ
    catChips.innerHTML = CATEGORIES.map(c =>
      `<button class="cat-chip ${c.id === sel.category ? 'active' : ''}" data-cat="${c.id}">
         <span class="cat-badge" style="background:${c.color}"></span>${c.name}
       </button>`
    ).join('');
    let adminMode = null; // null | { mode:'add' } | { mode:'edit', id }
    catChips.querySelectorAll('[data-cat]').forEach(chip => chip.onclick = () => {
      sel.category = chip.dataset.cat; sel.menuId = null; adminMode = null;

      renderMenuList(); renderDetail();
    });

    function renderMenuList() {
      const menus = menusOf(sel.category);
      menuSelect.innerHTML = `<option value="">メニューを選択</option>` + menus.map(mn =>
        `<option value="${mn.id}" ${mn.id === sel.menuId ? 'selected' : ''}>${escapeHTML(mn.name)}${mn.builtin ? '' : '（オリジナル）'}</option>`
      ).join('');
      menuSelect.onchange = () => {
        const mn = menus.find(x => x.id === menuSelect.value);
        if (!mn) { sel.menuId = null; sel.menuName = ''; detailArea.innerHTML = ''; renderMenuAdmin(); return; }
        sel.menuId = mn.id; sel.menuName = mn.name; sel.type = mn.type;
        renderDetail(); renderMenuAdmin();
      };
      renderMenuAdmin();
    }

    function renderMenuAdmin() {
      const box = body.querySelector('#menuAdmin');
      if (!adminMode) {
        const selectedCustom = state.customMenus.find(m => m.id === sel.menuId);
        box.innerHTML = `<div class="toolbar">
          <button type="button" class="btn ghost sm" id="addCustomBtn">＋ オリジナル種目の追加</button>
          ${selectedCustom ? `<button type="button" class="btn ghost sm" id="editCustomBtn">編集</button><button type="button" class="btn danger sm" id="delCustomBtn">削除</button>` : ''}
        </div>`;
        box.querySelector('#addCustomBtn').onclick = () => { adminMode = { mode: 'add' }; renderMenuAdmin(); };
        const editBtn = box.querySelector('#editCustomBtn');
        if (editBtn) editBtn.onclick = () => { adminMode = { mode: 'edit', id: sel.menuId }; renderMenuAdmin(); };
        const delBtn = box.querySelector('#delCustomBtn');
        if (delBtn) delBtn.onclick = () => {
          if (!confirm('このオリジナルメニューを削除しますか？')) return;
          state.customMenus = state.customMenus.filter(x => x.id !== sel.menuId);
          sel.menuId = null; sel.menuName = ''; detailArea.innerHTML = '';
          Store.save(); renderMenuList(); toast('削除しました');

        <div class="inline-form">
          <input id="ciName" placeholder="種目名（例: インクラインケーブルフライ）" value="${editing ? escapeHTML(editing.name) : ''}">
          <select id="ciType">
            <option value="strength" ${editing?.type === 'strength' ? 'selected' : ''}>重量×回数</option>
            <option value="cardio" ${editing?.type === 'cardio' ? 'selected' : ''}>時間・距離</option>
          </select>
          <button type="button" class="btn sm" id="ciSave">${editing ? '更新' : '追加'}</button>
          <button type="button" class="btn ghost sm" id="ciCancel">取消</button>
        </div>`;
      if (!editing) box.querySelector('#ciType').value = sel.category === 'cardio' ? 'cardio' : 'strength';
      box.querySelector('#ciCancel').onclick = () => { adminMode = null; renderMenuAdmin(); };

        const name = box.querySelector('#ciName').value.trim();
        if (!name) { toast('種目名を入力してください'); return; }

        if (editing) {
          editing.name = name; editing.type = type;
          if (sel.menuId === editing.id) { sel.menuName = name; sel.type = type; renderDetail(); }

        } else {
          state.customMenus.push({ id: 'c_' + uid(), category: sel.category, name, type, builtin: false });
          toast('追加しました');

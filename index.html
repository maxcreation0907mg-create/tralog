    }

    const legend = CATEGORIES.map(c =>
      `<span class="legend-item"><span class="dot" style="background:${c.color}"></span>${c.name}</span>`
    ).join('');

    panel.innerHTML = `
      <div class="cal-head">
        <div class="cal-title">${y}年 ${m + 1}月</div>
        <div class="cal-nav">
          <button class="icon-btn" id="prevM">‹</button>
          <button class="btn ghost sm" id="todayBtn">今日</button>
          <button class="icon-btn" id="nextM">›</button>
        </div>
      </div>
      <div class="weekdays">
        ${WEEK_JP.map((w, i) => `<span class="${i === 0 ? 'sun' : i === 6 ? 'sat' : ''}">${w}</span>`).join('')}
      </div>
      <div class="cal-grid">${cells}</div>
      <div class="legend">${legend}</div>
      <div class="toolbar">
        <button class="btn ghost sm" id="exportBtn">⬇️ CSV書き出し</button>
      </div>
    `;

    panel.querySelector('#prevM').onclick = () => { viewMonth.setMonth(m - 1); renderCalendar(); };
    panel.querySelector('#nextM').onclick = () => { viewMonth.setMonth(m + 1); renderCalendar(); };
    panel.querySelector('#todayBtn').onclick = () => {
      viewMonth = new Date(); viewMonth.setDate(1);
      selectedKey = dateKey(new Date());
      renderCalendar();
    };
    panel.querySelector('#exportBtn').onclick = exportData;
    panel.querySelectorAll('.cal-cell[data-key]').forEach(cell => bindCellGestures(cell));
  }

  // タップ=記録ポップアップ / 長押し（or 右クリック）=記録記入
  function bindCellGestures(cell) {
    const key = cell.dataset.key;
    let timer = null, longFired = false, moved = false;
    const LONG_MS = 450;

    const showDay = () => { openDayModal(key); };
    const quickAdd = () => {
      longFired = true;
      if (navigator.vibrate) navigator.vibrate(15);
      selectedKey = key;
      openRecordModal(null);
    };
    const startTimer = () => { longFired = false; moved = false; timer = setTimeout(quickAdd, LONG_MS); };
    const clearTimer = () => { if (timer) { clearTimeout(timer); timer = null; } };

    // タッチ操作
    cell.addEventListener('touchstart', startTimer, { passive: true });
    cell.addEventListener('touchmove', () => { moved = true; clearTimer(); }, { passive: true });
    cell.addEventListener('touchend', e => {
      clearTimer();
      if (longFired) { e.preventDefault(); return; }
      if (!moved) { e.preventDefault(); showDay(); }
    });
    // マウス操作（長押し対応）
    cell.addEventListener('mousedown', e => { if (e.button === 0) startTimer(); });
    cell.addEventListener('mouseup', () => clearTimer());
    cell.addEventListener('mouseleave', () => clearTimer());
    cell.addEventListener('click', () => { if (!longFired) showDay(); });
    // 右クリックでも記録記入
    cell.addEventListener('contextmenu', e => { e.preventDefault(); clearTimer(); selectedKey = key; openRecordModal(null); });
  }

  /* ============ 日別記録ポップアップ ============ */
  function openDayModal(key) {
    selectedKey = key;
    const [yy, mm, dd] = key.split('-').map(Number);
    const dt = new Date(yy, mm - 1, dd);
    Modal.open({
      title: `${mm}月${dd}日（${WEEK_JP[dt.getDay()]}）`,
      onSave: null,
      bodyHTML: '<div id="dayModalBody"></div>',
    });
    renderDayModalBody();
  }

  function renderDayModalBody() {
    const box = Modal.body.querySelector('#dayModalBody');
    if (!box) return;
    const recs = recordsOf(selectedKey);
    let html;
    if (!recs.length) {
      html = `<div class="empty-state"><div class="big">📝</div>この日の記録はまだありません。</div>`;
    } else {
      const groups = {};
      recs.forEach(r => { (groups[r.category] ||= []).push(r); });
      html = CATEGORIES.filter(c => groups[c.id]).map(c => `
        <div class="cat-group">
          <div class="cat-group-head"><span class="cat-badge" style="background:${c.color}"></span>${c.name}</div>
          ${groups[c.id].map(r => renderExCard(r)).join('')}
        </div>`).join('');
    }
    box.innerHTML = html + `<button class="btn block" id="dayAddBtn" style="margin-top:10px;">＋ 記録を追加</button>`;
    box.querySelector('#dayAddBtn').onclick = () => openRecordModal(null, { backToDay: true });
    box.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openRecordModal(b.dataset.edit, { backToDay: true }));
    box.querySelectorAll('[data-del]').forEach(b => b.onclick = () => {
      if (!confirm('この記録を削除しますか？')) return;
      deleteRecord(selectedKey, b.dataset.del);
      renderHero(); renderCalendar(); renderStats();
      renderDayModalBody();
      toast('削除しました');
    });
  }

  function renderExCard(r) {
    let detail = '';
    if (r.type === 'cardio') {
      const chips = [];
      if (r.duration) chips.push(`<span class="set-chip"><b>${r.duration}</b> 分</span>`);
      if (r.distance) chips.push(`<span class="set-chip"><b>${r.distance}</b> km</span>`);
      if (r.intensity) chips.push(`<span class="set-chip">強度 <b>${r.intensity}</b></span>`);
      detail = `<div class="ex-sets">${chips.join('') || '<span class="set-chip">記録あり</span>'}</div>`;
    } else {
      const chips = (r.sets || []).map((s, i) =>
        `<span class="set-chip">${i + 1}set <b>${s.weight || 0}</b>kg × <b>${s.reps || 0}</b></span>`
      ).join('');
      detail = `<div class="ex-sets">${chips || '<span class="set-chip">セット未入力</span>'}</div>`;
    }
    return `
      <div class="ex-card">
        <div class="ex-card-head">
          <span class="ex-name">${escapeHTML(r.menuName)}</span>
          <span class="ex-actions">
            <button class="link-btn" data-edit="${r.id}">編集</button>
            <button class="link-btn del" data-del="${r.id}">削除</button>
          </span>
        </div>
        ${detail}
        ${r.memo ? `<div class="ex-memo">💬 ${escapeHTML(r.memo)}</div>` : ''}
      </div>`;
  }

  /* ============ 描画: 種目別 分析 ============ */
  function renderStats() {
    const panel = rootEl.querySelector('#statsPanel');
    const menus = loggedMenus();
    if (!menus.length) {
      panel.innerHTML = `<div class="stats-head"><h2>📈 種目別の推移</h2></div>
        <div class="empty-state">記録を追加すると、種目ごとの重量やボリュームの推移グラフが表示されます。</div>`;
      return;
    }
    if (!statsMenuId || !menus.find(m => m.menuId === statsMenuId)) statsMenuId = menus[0].menuId;

    panel.innerHTML = `
      <div class="stats-head">
        <h2>📈 種目別の推移</h2>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <select id="statsSel" style="width:auto; min-width:200px;">
            ${menus.map(m => `<option value="${m.menuId}" ${m.menuId === statsMenuId ? 'selected' : ''}>${escapeHTML(m.menuName)}（${m.count}回）</option>`).join('')}
          </select>
          <div class="range-toggle">
            <button data-range="3m" class="${statsRange === '3m' ? 'active' : ''}">3ヶ月</button>
            <button data-range="all" class="${statsRange === 'all' ? 'active' : ''}">全期間</button>
          </div>
        </div>
      </div>
      <div id="statsBody"></div>`;

    panel.querySelector('#statsSel').onchange = e => { statsMenuId = e.target.value; renderStats(); };
    panel.querySelectorAll('[data-range]').forEach(b => b.onclick = () => { statsRange = b.dataset.range; renderStats(); });

    let recs = allRecordsForMenu(statsMenuId);
    if (statsRange === '3m') {
      const cut = new Date(); cut.setMonth(cut.getMonth() - 3);
      const cutKey = dateKey(cut);
      recs = recs.filter(r => r.date >= cutKey);
    }
    const isCardio = (menus.find(m => m.menuId === statsMenuId) || {}).type === 'cardio';
    const body = panel.querySelector('#statsBody');

    if (recs.length < 1) { body.innerHTML = `<div class="empty-state">この期間の記録がありません。</div>`; return; }

    const labels = recs.map(r => fmtMonthDay(r.date));
    let cards = '', chartCfg, tableHTML;

    if (isCardio) {
      const dur = recs.map(r => r.duration ?? null);
      const dist = recs.map(r => r.distance ?? null);
      const totalDur = dur.reduce((a, b) => a + (b || 0), 0);
      const totalDist = dist.reduce((a, b) => a + (b || 0), 0);
      cards = statCard('記録回数', recs.length, '回') + statCard('合計時間', totalDur, '分') + statCard('合計距離', round(totalDist, 1), 'km');
      chartCfg = {
        type: 'line',
        data: { labels, datasets: [
          { label: '時間(分)', data: dur, borderColor: cssVar('--primary'), backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y', spanGaps: true },
          { label: '距離(km)', data: dist, borderColor: cssVar('--cat-back'), backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y1', spanGaps: true },
        ] },
        options: { plugins: { zoom: zoomOpts() }, scales: { y: { position: 'left', title: { display: true, text: '分', color: cssVar('--muted') } }, y1: { position: 'right', title: { display: true, text: 'km', color: cssVar('--muted') }, grid: { drawOnChartArea: false } } } },
      };
      tableHTML = `<table class="data-table"><thead><tr><th>日付</th><th>時間(分)</th><th>距離(km)</th><th>強度</th></tr></thead>
        <tbody>${[...recs].reverse().map(r => `<tr><td>${fmtMonthDay(r.date)}</td><td>${r.duration ?? '-'}</td><td>${r.distance ?? '-'}</td><td>${r.intensity || '-'}</td></tr>`).join('')}</tbody></table>`;
    } else {
      const maxW = recs.map(r => Math.max(0, ...(r.sets || []).map(s => s.weight || 0)) || null);
      const vol = recs.map(r => (r.sets || []).reduce((a, s) => a + (s.weight || 0) * (s.reps || 0), 0) || null);
      const e1rm = recs.map(r => { const best = Math.max(0, ...(r.sets || []).map(s => (s.weight || 0) * (1 + (s.reps || 0) / 30))); return best ? round(best, 1) : null; });
      const curMax = maxW.filter(v => v != null).slice(-1)[0];
      const firstMax = maxW.filter(v => v != null)[0];
      cards = statCard('最新の最大重量', curMax, 'kg', curMax != null && firstMax != null ? curMax - firstMax : null) +
              statCard('最新ボリューム', vol.filter(v => v != null).slice(-1)[0], 'kg') +
              statCard('推定1RM', e1rm.filter(v => v != null).slice(-1)[0], 'kg') +
              statCard('記録回数', recs.length, '回');
      chartCfg = {
        type: 'line',
        data: { labels, datasets: [
          { label: '最大重量(kg)', data: maxW, borderColor: cssVar('--primary'), backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y', spanGaps: true },
          { label: 'ボリューム(kg)', data: vol, borderColor: cssVar('--cat-glute'), backgroundColor: 'transparent', borderDash: [5, 4], tension: 0.3, yAxisID: 'y1', spanGaps: true },
        ] },
        options: { plugins: { zoom: zoomOpts() }, scales: { y: { position: 'left', title: { display: true, text: 'kg', color: cssVar('--muted') } }, y1: { position: 'right', grid: { drawOnChartArea: false } } } },
      };
      tableHTML = `<table class="data-table"><thead><tr><th>日付</th><th>最大重量</th><th>ボリューム</th><th>セット詳細</th></tr></thead>
        <tbody>${[...recs].reverse().map((r, i) => {
          const mw = Math.max(0, ...(r.sets || []).map(s => s.weight || 0));
          const v = (r.sets || []).reduce((a, s) => a + (s.weight || 0) * (s.reps || 0), 0);
          return `<tr><td>${fmtMonthDay(r.date)}</td><td>${mw || '-'}kg</td><td>${v || '-'}</td><td style="text-align:left;color:var(--muted)">${escapeHTML(summarizeRecord(r))}</td></tr>`;
        }).join('')}</tbody></table>`;
    }

    body.innerHTML = `<div class="stat-cards">${cards}</div>
      <div class="chart-wrap"><canvas id="statsChart"></canvas></div>
      <div class="table-scroll">${tableHTML}</div>`;
    Charts.draw('statsChart', chartCfg);
  }

  function statCard(lbl, val, unit, delta) {
    let deltaHTML = '';
    if (delta != null && Number.isFinite(delta)) {
      const cls = delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat';
      const sign = delta > 0 ? '▲ +' : delta < 0 ? '▼ ' : '± ';
      deltaHTML = `<div class="delta ${cls}">${sign}${round(Math.abs(delta), 1)}${unit}</div>`;
    }
    return `<div class="stat-card"><div class="lbl">${lbl}</div><div class="val">${val ?? '-'}<small> ${unit}</small></div>${deltaHTML}</div>`;
  }

  /* ============ 記録 追加/編集 モーダル ============ */
  function openRecordModal(editId, opts = {}) {
    const editing = editId ? recordsOf(selectedKey).find(r => r.id === editId) : null;
    // 選択状態（モーダル内ローカル）
    let sel = {
      category: editing?.category || 'chest',
      menuId: editing?.menuId || null,
      menuName: editing?.menuName || '',
      type: editing?.type || 'strength',
    };

    Modal.open({
      title: editing ? 'トレーニングを編集' : 'トレーニングを追加',
      saveLabel: editing ? '更新' : '追加',
      bodyHTML: `
        <div class="field">
          <label class="field-label">カテゴリー</label>
          <div class="cat-chips" id="catChips"></div>
        </div>
        <div class="field">
          <label class="field-label">メニュー</label>
          <div class="menu-list" id="menuList"></div>
          <div id="menuAdmin" style="margin-top:8px;"></div>
        </div>
        <div id="detailArea"></div>
        <div class="field">
          <label class="field-label">メモ（任意）</label>
          <textarea id="recMemo" rows="2" placeholder="調子・フォームの気づきなど">${editing?.memo ? escapeHTML(editing.memo) : ''}</textarea>
        </div>
      `,
      onSave: (body) => {
        if (!sel.menuId) { toast('メニューを選択してください'); return false; }
        const rec = {
          id: editing?.id || uid(),
          category: sel.category,
          menuId: sel.menuId,
          menuName: sel.menuName,
          type: sel.type,
          memo: body.querySelector('#recMemo').value.trim(),
        };
        if (sel.type === 'cardio') {
          rec.duration = numOrNull(body.querySelector('#cDuration')?.value);
          rec.distance = numOrNull(body.querySelector('#cDistance')?.value);
          rec.intensity = body.querySelector('#cIntensity')?.value || '';
        } else {
          rec.sets = [...body.querySelectorAll('.set-row')].map(row => ({
            weight: numOrNull(row.querySelector('.in-weight').value),
            reps: numOrNull(row.querySelector('.in-reps').value),
          }));
        }
        if (editing) updateRecord(selectedKey, rec); else addRecord(selectedKey, rec);
        renderHero(); renderCalendar(); renderStats();
        toast(editing ? '更新しました' : '追加しました');
        if (opts.backToDay) setTimeout(() => openDayModal(selectedKey), 0);
      },
    });

    const body = Modal.body;
    const catChips = body.querySelector('#catChips');
    const menuList = body.querySelector('#menuList');
    const detailArea = body.querySelector('#detailArea');

    // カテゴリーチップ
    catChips.innerHTML = CATEGORIES.map(c =>
      `<button class="cat-chip ${c.id === sel.category ? 'active' : ''}" data-cat="${c.id}">
         <span class="cat-badge" style="background:${c.color}"></span>${c.name}
       </button>`
    ).join('');
    let adminMode = null; // null | { mode:'add' } | { mode:'edit', id }
    catChips.querySelectorAll('[data-cat]').forEach(chip => chip.onclick = () => {
      sel.category = chip.dataset.cat; sel.menuId = null; adminMode = null;
      catChips.querySelectorAll('.cat-chip').forEach(x => x.classList.toggle('active', x === chip));
      renderMenuList(); renderDetail();
    });

    function renderMenuList() {
      const menus = menusOf(sel.category);
      menuList.innerHTML = menus.map(mn => {
        const active = mn.id === sel.menuId ? 'active' : '';
        if (mn.builtin) return `<div class="menu-item ${active}" data-mid="${mn.id}"><span class="mi-name">${escapeHTML(mn.name)}</span></div>`;
        return `<div class="menu-item custom ${active}" data-mid="${mn.id}">
          <span class="mi-name">${escapeHTML(mn.name)}</span>
          <span class="mi-actions">
            <button type="button" class="mi-ico" data-edit-menu="${mn.id}" title="編集">✏️</button>
            <button type="button" class="mi-ico" data-del-menu="${mn.id}" title="削除">✕</button>
          </span>
        </div>`;
      }).join('') || `<p class="hint">メニューがありません。下のボタンから追加してください。</p>`;

      menuList.querySelectorAll('[data-mid]').forEach(it => it.onclick = () => {
        const mn = menus.find(x => x.id === it.dataset.mid);
        sel.menuId = mn.id; sel.menuName = mn.name; sel.type = mn.type;
        menuList.querySelectorAll('.menu-item').forEach(x => x.classList.toggle('active', x === it));
        renderDetail();
      });
      menuList.querySelectorAll('[data-edit-menu]').forEach(b => b.onclick = e => { e.stopPropagation(); adminMode = { mode: 'edit', id: b.dataset.editMenu }; renderMenuAdmin(); });
      menuList.querySelectorAll('[data-del-menu]').forEach(b => b.onclick = e => {
        e.stopPropagation();
        if (!confirm('このオリジナルメニューを削除しますか？')) return;
        const id = b.dataset.delMenu;
        state.customMenus = state.customMenus.filter(x => x.id !== id);
        if (sel.menuId === id) { sel.menuId = null; detailArea.innerHTML = ''; }
        Store.save(); renderMenuList(); toast('削除しました');
      });
      renderMenuAdmin();
    }

    function renderMenuAdmin() {
      const box = body.querySelector('#menuAdmin');
      if (!adminMode) {
        box.innerHTML = `<button type="button" class="btn ghost sm" id="addCustomBtn">＋ このカテゴリーにオリジナル種目を追加</button>`;
        box.querySelector('#addCustomBtn').onclick = () => { adminMode = { mode: 'add' }; renderMenuAdmin(); };
        return;
      }
      const editing = adminMode.mode === 'edit' ? state.customMenus.find(m => m.id === adminMode.id) : null;
      box.innerHTML = `
        <div class="inline-form">
          <input id="ciName" placeholder="種目名（例: インクラインケーブルフライ）" value="${editing ? escapeHTML(editing.name) : ''}">
          <select id="ciType">
            <option value="strength" ${editing?.type === 'strength' ? 'selected' : ''}>重量×回数</option>
            <option value="cardio" ${editing?.type === 'cardio' ? 'selected' : ''}>時間・距離</option>
          </select>
          <button type="button" class="btn sm" id="ciSave">${editing ? '更新' : '追加'}</button>
          <button type="button" class="btn ghost sm" id="ciCancel">取消</button>
        </div>`;
      if (!editing) box.querySelector('#ciType').value = sel.category === 'cardio' ? 'cardio' : 'strength';
      box.querySelector('#ciCancel').onclick = () => { adminMode = null; renderMenuAdmin(); };
      box.querySelector('#ciSave').onclick = () => {
        const name = box.querySelector('#ciName').value.trim();
        if (!name) { toast('種目名を入力してください'); return; }
        const type = box.querySelector('#ciType').value;
        if (editing) {
          editing.name = name; editing.type = type;
          if (sel.menuId === editing.id) { sel.menuName = name; sel.type = type; renderDetail(); }
          toast('更新しました');
        } else {
          state.customMenus.push({ id: 'c_' + uid(), category: sel.category, name, type, builtin: false });
          toast('追加しました');
        }
        Store.save(); adminMode = null; renderMenuList();
      };
      box.querySelector('#ciName').focus();
    }

    function renderDetail() {
      if (!sel.menuId) { detailArea.innerHTML = ''; return; }
      const prev = lastRecordForMenu(sel.menuId, editing ? null : selectedKey);
      const prevHTML = prev ? `
        <div class="prev-hint">
          <span><span class="pv-label">前回</span> <span class="pv-body">${fmtMonthDay(prev.date)} ・ <b>${escapeHTML(summarizeRecord(prev))}</b></span></span>
          ${!editing && sel.type !== 'cardio' ? `<button type="button" class="btn ghost sm" id="copyPrev">前回値をコピー</button>` : ''}
        </div>` : '';

      if (sel.type === 'cardio') {
        const dDur = editing ? editing.duration : prev?.duration;
        const dDist = editing ? editing.distance : prev?.distance;
        const dInt = editing ? editing.intensity : prev?.intensity;
        detailArea.innerHTML = prevHTML + `
          <div class="field">
            <label class="field-label">記録内容</label>
            <div class="cardio-grid">
              <div><label class="hint">時間（分）</label><input type="number" id="cDuration" min="0" step="1" value="${dDur ?? ''}" placeholder="30"></div>
              <div><label class="hint">距離（km）</label><input type="number" id="cDistance" min="0" step="0.1" value="${dDist ?? ''}" placeholder="5.0"></div>
            </div>
            <div style="margin-top:10px"><label class="hint">強度（任意）</label>
              <select id="cIntensity">
                <option value="">—</option>
                ${['低', '中', '高'].map(v => `<option ${dInt === v ? 'selected' : ''}>${v}</option>`).join('')}
              </select>
            </div>
          </div>`;
      } else {
        detailArea.innerHTML = prevHTML + `
          <div class="field">
            <label class="field-label">セット（重量 × 回数）</label>
            <div class="sets-editor" id="setsEditor"></div>
            <button type="button" class="btn ghost sm" id="addSetBtn">＋ セットを追加</button>
          </div>`;
        const editor = detailArea.querySelector('#setsEditor');
        const initial = editing?.sets?.length ? editing.sets : [{ weight: '', reps: '' }, { weight: '', reps: '' }, { weight: '', reps: '' }];
        initial.forEach(s => addSetRow(editor, s));
        detailArea.querySelector('#addSetBtn').onclick = () => addSetRow(editor, { weight: '', reps: '' });
        const copyBtn = detailArea.querySelector('#copyPrev');
        if (copyBtn) copyBtn.onclick = () => {
          editor.innerHTML = '';
          (prev.sets?.length ? prev.sets : [{ weight: '', reps: '' }]).forEach(s => addSetRow(editor, s));
          toast('前回値を反映しました');
        };
      }
    }

    function addSetRow(editor, s) {
      const row = document.createElement('div');
      row.className = 'set-row';
      const no = editor.children.length + 1;
      row.innerHTML = `
        <span class="setno">${no}</span>
        <span class="unit"><input class="in-weight" type="number" min="0" step="0.5" value="${s.weight ?? ''}" placeholder="0"><span>kg</span></span>
        <span class="unit"><input class="in-reps" type="number" min="0" step="1" value="${s.reps ?? ''}" placeholder="0"><span>回</span></span>
        <button type="button" class="remove-set">✕</button>`;
      row.querySelector('.remove-set').onclick = () => { row.remove(); renumber(editor); };
      editor.appendChild(row);
    }
    function renumber(editor) {
      [...editor.children].forEach((row, i) => row.querySelector('.setno').textContent = i + 1);
    }

    renderMenuList();
    if (editing) renderDetail();
  }

  /* ============ データ書き出し（CSV） ============ */
  function exportData() {
    const headers = ['日付', 'カテゴリー', 'メニュー', '種別', 'セット', '重量(kg)', '回数', '時間(分)', '距離(km)', '強度', 'メモ'];
    const rows = [];
    Object.keys(state.records).sort().forEach(date => {
      state.records[date].forEach(r => {
        const catName = catById(r.category).name;
        if (r.type === 'cardio') {
          rows.push([date, catName, r.menuName, '有酸素', '', '', '', r.duration ?? '', r.distance ?? '', r.intensity || '', r.memo || '']);
        } else if (r.sets && r.sets.length) {
          r.sets.forEach((s, i) => rows.push([date, catName, r.menuName, '筋トレ', i + 1, s.weight ?? '', s.reps ?? '', '', '', '', i === 0 ? (r.memo || '') : '']));
        } else {
          rows.push([date, catName, r.menuName, '筋トレ', '', '', '', '', '', '', r.memo || '']);
        }
      });
    });
    if (!rows.length) { toast('書き出すデータがありません'); return; }
    downloadFile(`workout-${dateKey(new Date())}.csv`, toCSV(headers, rows));
    toast('CSVを書き出しました');
  }

  return { id: 'workout', label: 'トレーニング記録', icon: '🏋️', render };
})();

/* =====================================================================
 *  体組成記録 Module（手動入力 / InBody CSV取り込み / 推移グラフ）
 * ===================================================================== */
const BODY_FIELDS = [
  { key: 'weight',      label: '体重',           unit: 'kg',   step: 0.1, aliases: ['体重', 'weight', 'body weight', 'body mass'] },
  { key: 'bodyFat',     label: '体脂肪率',       unit: '%',    step: 0.1, aliases: ['体脂肪率', 'body fat', 'fat rate', 'percent body fat'] },
  { key: 'smm',         label: '骨格筋量',       unit: 'kg',   step: 0.1, aliases: ['骨格筋量', 'skeletal muscle mass', 'smm'] },
  { key: 'muscle',      label: '筋肉量',         unit: 'kg',   step: 0.1, aliases: ['筋肉量', 'muscle mass', 'lean mass'] },
  { key: 'bodyFatMass', label: '体脂肪量',       unit: 'kg',   step: 0.1, aliases: ['体脂肪量', 'body fat mass', 'fat mass'] },
  { key: 'bmi',         label: 'BMI',            unit: '',     step: 0.1, aliases: ['bmi', 'body mass index'] },
  { key: 'bmr',         label: '基礎代謝量',     unit: 'kcal', step: 1,   aliases: ['基礎代謝量', 'bmr', 'basal metabolic rate'] },
  { key: 'visceralFat', label: '内臓脂肪レベル', unit: '',     step: 1,   aliases: ['内臓脂肪レベル', 'visceral fat level'] },
  { key: 'waist',       label: '腹囲',           unit: 'cm',   step: 0.1, aliases: ['腹囲', 'waist'] },
  { key: 'score',       label: 'InBody点数',     unit: '点',   step: 1,   aliases: ['inbody点数', 'inbody score', 'score'] },
  { key: 'protein',     label: 'タンパク質量',   unit: 'kg',   step: 0.1, aliases: ['タンパク質量', 'protein'] },
];
const bodyField = k => BODY_FIELDS.find(f => f.key === k);
function normHeader(h) { return String(h || '').replace(/^\uFEFF/, '').replace(/[（(].*?[)）]/g, '').replace(/\s+/g, '').trim().toLowerCase(); }

const BodyModule = (() => {
  const state = Store.ns('body', { records: [] });
  let rootEl = null;
  const PREVIEW = 5;            // 一覧の初期表示件数
  let expanded = false;         // 一覧を全件表示するか
  let metricKey = 'weight';     // 項目別グラフの選択中項目
  const selected = new Set();   // 一覧で選択中のID

  function sorted() { return [...state.records].sort((a, b) => (a.date + (a.time || '')).localeCompare(b.date + (b.time || ''))); }
  function firstValued(recs, k) { for (const r of recs) if (r[k] != null) return r; return null; }
  function lastValued(recs, k) { for (let i = recs.length - 1; i >= 0; i--) if (recs[i][k] != null) return recs[i]; return null; }

  function render(el) { rootEl = el; redraw(); }

  function redraw() {
    const recs = sorted();
    if (!recs.length) {
      rootEl.innerHTML = `
        <div class="panel">
          <div class="stats-head"><h2>📊 体組成</h2>
            <div class="toolbar" style="margin:0;">
              <button class="btn sm" id="bAdd">＋ 記録を追加</button>
              <label class="file-btn">📥 InBody CSV取り込み<input type="file" id="bCsv" accept=".csv,text/csv"></label>
            </div>
          </div>
          <div class="empty-state"><div class="big">📊</div>記録がありません。手動入力か、InBodyのCSVを取り込んでください。</div>
        </div>`;
      rootEl.querySelector('#bAdd').onclick = () => openRecordModal(null);
      rootEl.querySelector('#bCsv').onchange = handleCSV;
      return;
    }

    const last = recs[recs.length - 1], prev = recs[recs.length - 2];
    // 直近の記録にある全InBody項目をカード表示
    const presentFields = BODY_FIELDS.filter(f => last[f.key] != null);
    const cards = `<div class="stat-cards">` + presentFields.map(f => {
      const v = last[f.key], pv = prev?.[f.key];
      const d = (v != null && pv != null) ? round(v - pv, 1) : null;
      return bodyStatCard(f, v, d);
    }).join('') + `</div>`;

    // 項目別グラフの選択肢（データのある項目すべて）
    const chartableFields = BODY_FIELDS.filter(f => recs.some(r => r[f.key] != null));
    if (!chartableFields.find(f => f.key === metricKey)) metricKey = chartableFields[0]?.key || 'weight';

    rootEl.innerHTML = `
      <div class="panel coach">
        <div class="stats-head">
          <h2>📊 体組成</h2>
          <div class="toolbar" style="margin:0;">
            <button class="btn sm" id="bAdd">＋ 記録を追加</button>
            <label class="file-btn">📥 CSV取り込み<input type="file" id="bCsv" accept=".csv,text/csv"></label>
            <button class="btn ghost sm" id="bExport">⬇️ CSV書き出し</button>
          </div>
        </div>
        ${coachComment(recs)}
      </div>

      <div class="panel">
        <div class="stats-head" style="margin-bottom:6px;">
          <h2 style="font-size:16px;">最新の状態（前回測定比）</h2>
          <span class="hint">${last.date}${last.time ? ' ' + last.time : ''} 時点</span>
        </div>
        ${cards}
      </div>

      <div class="panel">
        <div class="stats-head" style="margin-bottom:4px;">
          <h2 style="font-size:16px;">体重推移</h2>
          <button class="btn ghost sm" id="bZoomReset">全体</button>
        </div>
        <div class="chart-wrap"><canvas id="bWeightChart"></canvas></div>
      </div>

      <div class="panel">
        <div class="stats-head" style="margin-bottom:4px;">
          <h2 style="font-size:16px;">体脂肪率 と 骨格筋量</h2>
          <button class="btn ghost sm" id="bCompReset">全体</button>
        </div>
        <div class="chart-wrap"><canvas id="bCompChart"></canvas></div>
      </div>

      <div class="panel">
        <div class="stats-head" style="margin-bottom:4px;">
          <h2 style="font-size:16px;">項目別の推移</h2>
          <div style="display:flex; gap:8px; align-items:center;">
            <select id="bMetricSel" style="width:auto; min-width:160px;">
              ${chartableFields.map(f => `<option value="${f.key}" ${f.key === metricKey ? 'selected' : ''}>${f.label}${f.unit ? '（' + f.unit + '）' : ''}</option>`).join('')}
            </select>
            <button class="btn ghost sm" id="bMetricReset">全体</button>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="bMetricChart"></canvas></div>
      </div>

      <div class="panel">
        <div class="stats-head" style="margin-bottom:8px;">
          <h2 style="font-size:16px;">記録一覧</h2>
          <div id="bBulkBar"></div>
        </div>
        <div id="bTable"></div>
      </div>`;

    rootEl.querySelector('#bAdd').onclick = () => openRecordModal(null);
    rootEl.querySelector('#bCsv').onchange = handleCSV;
    rootEl.querySelector('#bExport').onclick = exportCSV;
    rootEl.querySelector('#bZoomReset').onclick = () => Charts.resetZoom('bWeightChart');
    rootEl.querySelector('#bCompReset').onclick = () => Charts.resetZoom('bCompChart');
    rootEl.querySelector('#bMetricReset').onclick = () => Charts.resetZoom('bMetricChart');
    rootEl.querySelector('#bMetricSel').onchange = e => { metricKey = e.target.value; drawMetricChart(recs); };

    drawCharts(recs);
    drawMetricChart(recs);
    renderTable(recs);
  }

  /* --- コーチコメント（トレンド分析） --- */
  function coachComment(recs) {
    if (recs.length < 2) {
      return `<div class="coach-box"><span class="coach-ava">🧑‍🏫</span>
        <div><b>記録ありがとうございます！</b><br><span class="hint">あと数回記録すると、体重・体脂肪・筋肉の変化を分析してアドバイスします。まずは継続が一番の近道です。</span></div></div>`;
    }
    const lastW = lastValued(recs, 'weight'), firstW = firstValued(recs, 'weight');
    const lastF = lastValued(recs, 'bodyFat'), firstF = firstValued(recs, 'bodyFat');
    const lastM = lastValued(recs, 'smm'), firstM = firstValued(recs, 'smm');
    const dW = (lastW && firstW && lastW !== firstW) ? round(lastW.weight - firstW.weight, 1) : null;
    const dF = (lastF && firstF && lastF !== firstF) ? round(lastF.bodyFat - firstF.bodyFat, 1) : null;
    const dM = (lastM && firstM && lastM !== firstM) ? round(lastM.smm - firstM.smm, 1) : null;

    const span = `${recs[0].date.replace(/-/g, '/')}〜${recs[recs.length - 1].date.replace(/-/g, '/')}（${recs.length}回）`;
    const chips = [];
    if (dW != null) chips.push(trendChip('体重', dW, 'kg', false));
    if (dF != null) chips.push(trendChip('体脂肪率', dF, '%', true));
    if (dM != null) chips.push(trendChip('骨格筋量', dM, 'kg', false));

    let msg;
    const fatDown = dF != null && dF < 0, fatUp = dF != null && dF > 0;
    const musUp = dM != null && dM > 0, musDown = dM != null && dM < 0;
    if (fatDown && (musUp || (dM != null && dM >= -0.2))) {
      msg = '理想的な変化です！脂肪が落ちつつ筋肉を維持・増量できています。今のトレーニングと食事の方向性を継続しましょう。💪';
    } else if (musUp && (dW != null && dW > 0) && !fatUp) {
      msg = '増量フェーズとして良い流れです。筋肉がしっかり増えています。体脂肪率が上がりすぎないよう、引き続き食事の質に気を配りましょう。';
    } else if (fatUp && musDown) {
      msg = '少し脂肪が増え筋肉が減る傾向です。タンパク質の摂取（体重×1.6〜2.0g）と、週2〜3回の筋トレ頻度を見直してみましょう。';
    } else if (dW != null && dW < 0 && musDown) {
      msg = '体重が落ちていますが筋肉も減り気味です。減量ペースを緩め、筋トレ強度とタンパク質量を確保して筋肉を守りましょう。';
    } else {
      msg = '大きな変化は見られません。停滞期かもしれません。トレーニング強度・摂取カロリー・睡眠のいずれかを少し調整してみましょう。';
    }

    return `<div class="coach-box">
      <span class="coach-ava">🧑‍🏫</span>
      <div style="flex:1;">
        <b>コーチからのひとこと</b>
        <div class="hint" style="margin:2px 0 8px;">分析期間: ${span}</div>
        <div class="trend-chips">${chips.join('')}</div>
        <p style="margin-top:8px;">${msg}</p>
      </div>
    </div>`;
  }
  function trendChip(label, delta, unit, goodDown) {
    const positive = goodDown ? delta < 0 : delta > 0;
    const cls = delta === 0 ? 'flat' : positive ? 'up' : 'down';
    const arrow = delta > 0 ? '↑' : delta < 0 ? '↓' : '→';
    const sign = delta > 0 ? '+' : '';
    return `<span class="trend-chip ${cls}">${label} <b>${sign}${delta}${unit}</b> ${arrow}</span>`;
  }

  function bodyStatCard(f, v, delta) {
    let deltaHTML = '';
    if (delta != null) {
      const goodDown = ['bodyFat', 'bodyFatMass', 'visceralFat', 'waist'].includes(f.key);
      const positive = goodDown ? delta < 0 : delta > 0;
      const cls = delta === 0 ? 'flat' : positive ? 'up' : 'down';
      const sign = delta > 0 ? '+' : '';
      deltaHTML = `<div class="delta ${cls}">${sign}${delta}${f.unit}（前回比）</div>`;
    }
    return `<div class="stat-card"><div class="lbl">${f.label}</div><div class="val">${v ?? '-'}<small> ${f.unit}</small></div>${deltaHTML}</div>`;
  }

  // 直近1ヶ月の開始インデックス（初期表示ウィンドウ用）
  function monthStartIndex(pts) {
    const cut = new Date(); cut.setMonth(cut.getMonth() - 1);
    const cutKey = dateKey(cut);
    const idx = pts.findIndex(r => r.date >= cutKey);
    return idx > 0 ? idx : undefined;
  }

  function lineOpts(pts, extraScales = {}) {
    return {
      interaction: { mode: 'index', intersect: false },
      plugins: { zoom: zoomOpts(pts.length - 1) },
      scales: {
        x: { min: monthStartIndex(pts), ticks: { maxTicksLimit: 8, maxRotation: 0, autoSkip: true } },
        ...extraScales,
      },
    };
  }

  function drawCharts(recs) {
    if (!recs.length) return;
    const labels = recs.map(r => fmtMonthDay(r.date));
    Charts.draw('bWeightChart', {
      type: 'line',
      data: { labels, datasets: [{ label: '体重(kg)', data: recs.map(r => r.weight ?? null), borderColor: cssVar('--primary'), backgroundColor: 'rgba(50,102,173,0.12)', fill: true, tension: 0.3, spanGaps: true, borderWidth: 2 }] },
      options: lineOpts(recs, { y: {} }),
    });
    Charts.draw('bCompChart', {
      type: 'line',
      data: { labels, datasets: [
        { label: '体脂肪率(%)', data: recs.map(r => r.bodyFat ?? null), borderColor: cssVar('--danger'), backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y', spanGaps: true, borderWidth: 2 },
        { label: '骨格筋量(kg)', data: recs.map(r => r.smm ?? null), borderColor: cssVar('--success'), backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y1', spanGaps: true, borderWidth: 2 },
      ] },
      options: lineOpts(recs, {
        y: { position: 'left', title: { display: true, text: '%', color: cssVar('--muted') } },
        y1: { position: 'right', title: { display: true, text: 'kg', color: cssVar('--muted') }, grid: { drawOnChartArea: false } },
      }),
    });
  }

  // InBodyの任意項目の推移グラフ
  function drawMetricChart(recs) {
    const f = bodyField(metricKey);
    if (!f) return;
    const pts = recs.filter(r => r[f.key] != null);
    Charts.draw('bMetricChart', {
      type: 'line',
      data: { labels: pts.map(r => fmtMonthDay(r.date)), datasets: [{
        label: `${f.label}${f.unit ? '(' + f.unit + ')' : ''}`,
        data: pts.map(r => r[f.key]),
        borderColor: cssVar('--cat-glute'), backgroundColor: 'rgba(181,83,156,0.10)',
        fill: true, tension: 0.3, borderWidth: 2,
      }] },
      options: lineOpts(pts, { y: {} }),
    });
  }

  function renderTable(recs) {
    const el = rootEl.querySelector('#bTable');
    const bulk = rootEl.querySelector('#bBulkBar');
    const cols = ['weight', 'bodyFat', 'smm', 'bmi', 'visceralFat'];
    const descRecs = [...recs].reverse();
    const shown = expanded ? descRecs : descRecs.slice(0, PREVIEW);

    // 一括操作バー
    bulk.innerHTML = selected.size
      ? `<button class="btn danger sm" id="bBulkDel">🗑 選択した${selected.size}件を削除</button>
         <button class="btn ghost sm" id="bClearSel">選択解除</button>`
      : '';

    el.innerHTML = `<div class="table-scroll"><table class="data-table">
      <thead><tr>
        <th style="text-align:center;width:34px;"><input type="checkbox" id="bSelAll"></th>
        <th>日付</th>${cols.map(k => `<th>${bodyField(k).label}</th>`).join('')}<th></th>
      </tr></thead>
      <tbody>${shown.map(r => `
        <tr data-row="${r.id}">
          <td style="text-align:center;"><input type="checkbox" class="bSel" data-id="${r.id}" ${selected.has(r.id) ? 'checked' : ''}></td>
          <td>${r.date}${r.time ? ' <span style="color:var(--muted)">' + r.time + '</span>' : ''}</td>
          ${cols.map(k => `<td>${r[k] ?? '-'}</td>`).join('')}
          <td style="text-align:right;"><button class="link-btn" data-edit="${r.id}">編集</button><button class="link-btn del" data-del="${r.id}">削除</button></td>
        </tr>`).join('')}</tbody></table></div>
      ${descRecs.length > PREVIEW ? `<div style="text-align:center;margin-top:10px;">
        <button class="btn ghost sm" id="bToggle">${expanded ? '閉じる' : `もっと見る（残り${descRecs.length - PREVIEW}件）`}</button></div>` : ''}`;

    el.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openRecordModal(b.dataset.edit));
    el.querySelectorAll('[data-del]').forEach(b => b.onclick = () => {
      if (confirm('この記録を削除しますか？')) { state.records = state.records.filter(r => r.id !== b.dataset.del); selected.delete(b.dataset.del); Store.save(); redraw(); toast('削除しました'); }
    });
    el.querySelectorAll('.bSel').forEach(c => c.onchange = () => {
      if (c.checked) selected.add(c.dataset.id); else selected.delete(c.dataset.id);
      renderTable(recs);
    });
    const selAll = el.querySelector('#bSelAll');
    if (selAll) {
      selAll.checked = shown.length > 0 && shown.every(r => selected.has(r.id));
      selAll.onchange = () => { shown.forEach(r => selAll.checked ? selected.add(r.id) : selected.delete(r.id)); renderTable(recs); };
    }
    const toggle = el.querySelector('#bToggle');
    if (toggle) toggle.onclick = () => { expanded = !expanded; renderTable(recs); };

    const bulkDel = bulk.querySelector('#bBulkDel');
    if (bulkDel) bulkDel.onclick = () => {
      if (!confirm(`選択した${selected.size}件を削除しますか？`)) return;
      state.records = state.records.filter(r => !selected.has(r.id));
      selected.clear(); Store.save(); redraw(); toast('まとめて削除しました');
    };
    const clearSel = bulk.querySelector('#bClearSel');
    if (clearSel) clearSel.onclick = () => { selected.clear(); renderTable(recs); };
  }

  function exportCSV() {
    const recs = sorted();
    if (!recs.length) { toast('書き出すデータがありません'); return; }
    const headers = ['日付', '時刻', ...BODY_FIELDS.map(f => `${f.label}${f.unit ? '(' + f.unit + ')' : ''}`), 'メモ'];
    const rows = recs.map(r => [r.date, r.time || '', ...BODY_FIELDS.map(f => r[f.key] ?? ''), r.memo || '']);
    downloadFile(`body-composition-${dateKey(new Date())}.csv`, toCSV(headers, rows));
    toast('CSVを書き出しました');
  }

  function openRecordModal(editId) {
    const editing = editId ? state.records.find(r => r.id === editId) : null;
    Modal.open({
      title: editing ? '体組成を編集' : '体組成を記録',
      saveLabel: editing ? '更新' : '追加',
      bodyHTML: `
        <div class="field">
          <label class="field-label">測定日</label>
          <input type="date" id="bDate" value="${editing?.date || dateKey(new Date())}">
        </div>
        <div class="pfc-grid" style="grid-template-columns:1fr 1fr;">
          ${BODY_FIELDS.map(f => `
            <div class="field" style="margin-bottom:10px;">
              <label class="hint">${f.label}${f.unit ? '（' + f.unit + '）' : ''}</label>
              <input type="number" step="${f.step}" id="bf_${f.key}" value="${editing?.[f.key] ?? ''}">
            </div>`).join('')}
        </div>
        <div class="field"><label class="field-label">メモ（任意）</label><textarea id="bMemo" rows="2">${editing?.memo ? escapeHTML(editing.memo) : ''}</textarea></div>`,
      onSave: (b) => {
        const date = b.querySelector('#bDate').value;
        if (!date) { toast('測定日を入力してください'); return false; }
        const rec = { id: editing?.id || uid(), date, time: editing?.time || '', source: editing?.source || 'manual', memo: b.querySelector('#bMemo').value.trim() };
        let any = false;
        BODY_FIELDS.forEach(f => { const v = numOrNull(b.querySelector('#bf_' + f.key).value); if (v != null) { rec[f.key] = v; any = true; } });
        if (!any) { toast('いずれかの数値を入力してください'); return false; }
        if (editing) { const i = state.records.findIndex(r => r.id === editing.id); state.records[i] = rec; }
        else state.records.push(rec);
        Store.save(); redraw(); toast(editing ? '更新しました' : '追加しました');
      },
    });
  }

  function handleCSV(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const rows = parseCSV(String(ev.target.result));
        if (rows.length < 2) { toast('データが見つかりませんでした'); return; }
        const headers = rows[0];
        const dateIdx = headers.findIndex(h => /日付|date|datetime|測定日時/i.test(normHeader(h)) || normHeader(h) === '日付');
        const map = {}; // colIndex -> fieldKey
        headers.forEach((h, i) => {
          const nh = normHeader(h);
          const f = BODY_FIELDS.find(f => f.aliases.some(a => normHeader(a) === nh));
          if (f) map[i] = f.key;
        });
        let added = 0;
        rows.slice(1).forEach(row => {
          const rawDate = dateIdx >= 0 ? row[dateIdx] : '';
          const dk = normDateKey(rawDate) || dateKey(new Date());
          const digits = String(rawDate).replace(/[^\d]/g, '');
          const time = digits.length >= 12 ? `${digits.slice(8, 10)}:${digits.slice(10, 12)}` : '';
          const rec = { id: uid(), date: dk, time, source: 'inbody', memo: 'CSV取り込み' };
          let any = false;
          Object.entries(map).forEach(([i, key]) => { const v = parseNum(row[i]); if (v != null) { rec[key] = v; any = true; } });
          if (!any) return;
          // 同一日時の重複はスキップ
          if (state.records.some(r => r.date === dk && r.time === time && r.weight === rec.weight)) return;
          state.records.push(rec); added++;
        });
        Store.save(); redraw();
        toast(added ? `${added}件を取り込みました` : '新規データはありませんでした');
      } catch (err) { console.error(err); toast('CSVの読み込みに失敗しました'); }
      e.target.value = '';
    };
    reader.readAsText(file);
  }

  return { id: 'body', label: '体組成記録', icon: '📊', render };
})();

/* =====================================================================
 *  食事管理 Module（カロリー・PFC記録 / 目標 / 推移）
 * ===================================================================== */
const MEAL_TYPES = ['朝食', '昼食', '夕食', '間食'];
const MealModule = (() => {
  const state = Store.ns('meal', { days: {}, targets: { kcal: 2000, p: 120, f: 60, c: 250 } });
  let selectedKey = dateKey(new Date());
  let rootEl = null;

  const dayList = key => state.days[key] || [];
  function totals(key) {
    return dayList(key).reduce((t, m) => ({ kcal: t.kcal + (m.kcal || 0), p: t.p + (m.p || 0), f: t.f + (m.f || 0), c: t.c + (m.c || 0) }), { kcal: 0, p: 0, f: 0, c: 0 });
  }

  function render(el) { rootEl = el; redraw(); }

  function redraw() {
    const [yy, mm, dd] = selectedKey.split('-').map(Number);
    const dt = new Date(yy, mm - 1, dd);
    const t = totals(selectedKey);
    const tg = state.targets;

    rootEl.innerHTML = `
      <div class="panel">
        <div class="stats-head">
          <h2>🍽️ 食事管理</h2>
          <div style="display:flex; gap:8px; align-items:center;">
            <button class="icon-btn" id="mPrev">‹</button>
            <button class="btn ghost sm" id="mToday">今日</button>
            <button class="icon-btn" id="mNext">›</button>
          </div>
        </div>
        <div class="day-date" style="margin-bottom:12px;">${mm}月${dd}日（${WEEK_JP[dt.getDay()]}）</div>
        <div class="meal-totals">
          ${macroCard('カロリー', t.kcal, tg.kcal, 'kcal', '--primary')}
          ${macroCard('タンパク質', t.p, tg.p, 'g', '--cat-back')}
          ${macroCard('脂質', t.f, tg.f, 'g', '--cat-arm')}
          ${macroCard('炭水化物', t.c, tg.c, 'g', '--cat-leg')}
        </div>
        <div class="macro-bar">${macroBar(t)}</div>
        <p class="hint" style="margin-top:6px;">PFCバランス（カロリー比）</p>
        <div class="toolbar">
          <button class="btn sm" id="mAdd">＋ 食事を追加</button>
          <button class="btn ghost sm" id="mTarget">🎯 目標を設定</button>
        </div>
      </div>
      <div class="panel"><div id="mMeals"></div></div>
      <div class="panel">
        <h2 style="font-size:16px;margin-bottom:6px;">直近14日のカロリー推移</h2>
        <div class="chart-wrap sm"><canvas id="mChart"></canvas></div>
      </div>`;

    rootEl.querySelector('#mPrev').onclick = () => { shiftDay(-1); };
    rootEl.querySelector('#mNext').onclick = () => { shiftDay(1); };
    rootEl.querySelector('#mToday').onclick = () => { selectedKey = dateKey(new Date()); redraw(); };
    rootEl.querySelector('#mAdd').onclick = () => openMealModal(null);
    rootEl.querySelector('#mTarget').onclick = openTargetModal;

    renderMeals();
    drawChart();
  }

  function shiftDay(n) { const [y, m, d] = selectedKey.split('-').map(Number); const dt = new Date(y, m - 1, d + n); selectedKey = dateKey(dt); redraw(); }

  function macroCard(label, val, target, unit, color) {
    const pct = target ? Math.min(100, Math.round(val / target * 100)) : 0;
    return `<div class="stat-card">
      <div class="lbl">${label}</div>
      <div class="val">${Math.round(val)}<small> / ${target}${unit}</small></div>
      <div class="macro-bar" style="margin-top:8px;"><i style="width:${pct}%;background:var(${color});"></i></div>
      <div class="hint" style="margin-top:4px;">${pct}%</div>
    </div>`;
  }

  function macroBar(t) {
    const pk = t.p * 4, fk = t.f * 9, ck = t.c * 4;
    const sum = pk + fk + ck;
    if (!sum) return `<i style="width:100%;background:var(--border);"></i>`;
    return `<i style="width:${pk / sum * 100}%;background:var(--cat-back);" title="P"></i>
            <i style="width:${fk / sum * 100}%;background:var(--cat-arm);" title="F"></i>
            <i style="width:${ck / sum * 100}%;background:var(--cat-leg);" title="C"></i>`;
  }

  function renderMeals() {
    const el = rootEl.querySelector('#mMeals');
    const list = dayList(selectedKey);
    if (!list.length) { el.innerHTML = `<div class="empty-state"><div class="big">🍽️</div>この日の食事記録はまだありません。</div>`; return; }
    el.innerHTML = MEAL_TYPES.filter(tp => list.some(m => m.type === tp)).map(tp => {
      const items = list.filter(m => m.type === tp);
      const sub = items.reduce((a, m) => a + (m.kcal || 0), 0);
      return `<div class="meal-section">
        <div class="meal-section-head">${tp} <span class="hint" style="font-weight:600;">${Math.round(sub)} kcal</span></div>
        ${items.map(m => `<div class="ex-card"><div class="ex-card-head">
            <span class="ex-name">${escapeHTML(m.name)}</span>
            <span class="ex-actions"><button class="link-btn" data-edit="${m.id}">編集</button><button class="link-btn del" data-del="${m.id}">削除</button></span>
          </div>
          <div class="ex-sets">
            <span class="set-chip"><b>${m.kcal || 0}</b> kcal</span>
            <span class="set-chip">P <b>${m.p || 0}</b>g</span>
            <span class="set-chip">F <b>${m.f || 0}</b>g</span>
            <span class="set-chip">C <b>${m.c || 0}</b>g</span>
          </div></div>`).join('')}
      </div>`;
    }).join('');
    el.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openMealModal(b.dataset.edit));
    el.querySelectorAll('[data-del]').forEach(b => b.onclick = () => {
      if (confirm('この食事を削除しますか？')) { state.days[selectedKey] = dayList(selectedKey).filter(m => m.id !== b.dataset.del); if (!state.days[selectedKey].length) delete state.days[selectedKey]; Store.save(); redraw(); toast('削除しました'); }
    });
  }

  function drawChart() {
    const labels = [], data = [];
    const [y, m, d] = selectedKey.split('-').map(Number);
    for (let i = 13; i >= 0; i--) {
      const dt = new Date(y, m - 1, d - i);
      const k = dateKey(dt);
      labels.push(fmtMonthDay(k));
      data.push(totals(k).kcal || 0);
    }
    Charts.draw('mChart', {
      type: 'bar',
      data: { labels, datasets: [{ label: 'カロリー(kcal)', data, backgroundColor: cssVar('--primary'), borderRadius: 5 }] },
      options: { plugins: { legend: { display: false } } },
    });
  }

  function openMealModal(editId) {
    const editing = editId ? dayList(selectedKey).find(m => m.id === editId) : null;
    Modal.open({
      title: editing ? '食事を編集' : '食事を追加',
      saveLabel: editing ? '更新' : '追加',
      bodyHTML: `
        <div class="field">
          <label class="field-label">区分</label>
          <select id="mType">${MEAL_TYPES.map(tp => `<option ${editing?.type === tp ? 'selected' : ''}>${tp}</option>`).join('')}</select>
        </div>
        <div class="field">
          <label class="field-label">メニュー名</label>
          <input id="mName" placeholder="例: 鶏むね肉とごはん" value="${editing?.name ? escapeHTML(editing.name) : ''}">
        </div>
        <div class="field">
          <label class="field-label">栄養</label>
          <div class="pfc-grid">
            <div><label class="hint">カロリー(kcal)</label><input type="number" id="mKcal" min="0" value="${editing?.kcal ?? ''}" placeholder="500"></div>
            <div><label class="hint">P タンパク質(g)</label><input type="number" id="mP" min="0" step="0.1" value="${editing?.p ?? ''}" placeholder="30"></div>
            <div><label class="hint">F 脂質(g)</label><input type="number" id="mF" min="0" step="0.1" value="${editing?.f ?? ''}" placeholder="15"></div>
            <div><label class="hint">C 炭水化物(g)</label><input type="number" id="mC" min="0" step="0.1" value="${editing?.c ?? ''}" placeholder="60"></div>
          </div>
          <p class="hint" id="mCalc"></p>
        </div>`,
      onSave: (b) => {
        const name = b.querySelector('#mName').value.trim();
        if (!name) { toast('メニュー名を入力してください'); return false; }
        const rec = {
          id: editing?.id || uid(), type: b.querySelector('#mType').value, name,
          kcal: numOrNull(b.querySelector('#mKcal').value) || 0,
          p: numOrNull(b.querySelector('#mP').value) || 0,
          f: numOrNull(b.querySelector('#mF').value) || 0,
          c: numOrNull(b.querySelector('#mC').value) || 0,
        };
        if (!state.days[selectedKey]) state.days[selectedKey] = [];
        if (editing) { const i = state.days[selectedKey].findIndex(m => m.id === editing.id); state.days[selectedKey][i] = rec; }
        else state.days[selectedKey].push(rec);
        Store.save(); redraw(); toast(editing ? '更新しました' : '追加しました');
      },
    });
    // PFCからカロリー自動計算の補助表示
    const b = Modal.body;
    const calc = () => {
      const p = numOrNull(b.querySelector('#mP').value) || 0, f = numOrNull(b.querySelector('#mF').value) || 0, c = numOrNull(b.querySelector('#mC').value) || 0;
      const est = Math.round(p * 4 + f * 9 + c * 4);
      b.querySelector('#mCalc').textContent = est ? `PFCからの推定カロリー: 約 ${est} kcal（参考）` : '';
    };
    ['#mP', '#mF', '#mC'].forEach(s => b.querySelector(s).oninput = calc);
    calc();
  }

  function openTargetModal() {
    const tg = state.targets;
    Modal.open({
      title: '🎯 1日の目標を設定',
      saveLabel: '保存',
      bodyHTML: `<div class="pfc-grid">
        <div><label class="hint">カロリー(kcal)</label><input type="number" id="tKcal" value="${tg.kcal}"></div>
        <div><label class="hint">P タンパク質(g)</label><input type="number" id="tP" value="${tg.p}"></div>
        <div><label class="hint">F 脂質(g)</label><input type="number" id="tF" value="${tg.f}"></div>
        <div><label class="hint">C 炭水化物(g)</label><input type="number" id="tC" value="${tg.c}"></div>
      </div>`,
      onSave: (b) => {
        state.targets = {
          kcal: numOrNull(b.querySelector('#tKcal').value) || 0,
          p: numOrNull(b.querySelector('#tP').value) || 0,
          f: numOrNull(b.querySelector('#tF').value) || 0,
          c: numOrNull(b.querySelector('#tC').value) || 0,
        };
        Store.save(); redraw(); toast('目標を保存しました');
      },
    });
  }

  return { id: 'meal', label: '食事管理', icon: '🍽️', render };
})();

/* ---------------- 共通ヘルパ ---------------- */
function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function numOrNull(v) { if (v === '' || v == null) return null; const n = Number(v); return isNaN(n) ? null : n; }

/* =====================================================================
 *  起動: モジュール登録
 * ===================================================================== */
App.registerModule(WorkoutModule);
App.registerModule(BodyModule);
App.registerModule(MealModule);
App.start();
</script>
</body>
</html>

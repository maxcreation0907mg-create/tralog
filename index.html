<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#15181d">
<title>Tralog</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='black'/%3E%3Cpath d='M24 28h52M50 28v46' stroke='white' stroke-width='12' stroke-linecap='round'/%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ===== デザイン: ダーク基調 + アクセント1色（ライム） ===== */
  :root {
    --primary: #c3f53c;            /* アクセント: ライム */
    --primary-dark: #aede2e;       /* hover用 やや深いライム */
    --primary-light: rgba(195, 245, 60, 0.14);
    --on-primary: #131807;         /* ライム上のテキスト色 */
    --success: #7bd94a;
    --danger: #ff6b5e;
    --warning: #f0a83c;
    --bg: #0d0f13;
    --surface: #15181d;            /* ページ基調 */
    --surface-2: #0f1216;          /* インセット面（入力・セル） */
    --border: #2b303a;
    --text: #f2f4f6;
    --muted: #98a1ad;
    --radius: 16px;
    --shadow: 0 2px 14px rgba(0, 0, 0, 0.35);

    /* カテゴリーカラー（ダーク背景向けに明度アップ / 拡張時もここに追記するだけ） */
    --cat-chest: #ff7a6e;
    --cat-arm: #ffb347;
    --cat-shoulder: #ffd34d;
    --cat-back: #4fd58c;
    --cat-leg: #5aa3ff;
    --cat-glute: #e07ad0;
    --cat-abs: #38d9d9;
    --cat-cardio: #ff7a6e;
    --cat-other: #9aa2ae;
  }

  body {
    background: var(--surface);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1080px; margin: 0 auto; padding: 0 20px 96px; }

  /* ===== ヘッダー / 固定フッター ===== */
  .app-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-size: clamp(24px, 4vw, 30px);
    font-weight: 900;
    letter-spacing: -0.02em;
    align-self: center;
    padding: 12px 0;
    line-height: 1.1;
    background: linear-gradient(120deg, var(--primary), #4fd58c);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .app-footer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 40;
    background: color-mix(in srgb, var(--surface) 94%, transparent);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(14px);
  }
  .footer-inner {
    max-width: 1080px;
    margin: 0 auto;
    padding: 10px 20px calc(10px + env(safe-area-inset-bottom));
    display: block;
    align-items: center;
    gap: 8px;
  }

  /* タブナビ（モジュールごとに自動生成・アイコン表示） */
  .tabbar {
    display: flex;
    justify-content: space-around;
    gap: 2px;
    overflow-x: auto;
  }
  .tabbar button {
    flex: 0 0 auto;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    min-height: 58px;
    padding: 10px 14px 8px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tabbar button .tab-ico { font-size: 20px; line-height: 1.2; }
  .tabbar svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .tabbar button .tab-lbl { font-size: 12px; font-weight: 800; }
  .tabbar button:hover { color: var(--text); }
  .tabbar button.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tabbar button .soon { font-size: 10px; opacity: 0.8; font-weight: 600; }
  .account-btn {
    align-self: center;
    border: none;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    border-radius: 12px;
    font-size: 22px;
    font-weight: 800;
    padding: 8px 10px;
    white-space: nowrap;
  }
  .account-btn:hover { color: var(--primary); background: var(--surface-2); }

  .module-view { animation: fade 0.2s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* セクションは枠ではなく線で区切る */
  .panel {
    background: transparent;
    border: none;
    border-radius: 0;
    box-shadow: none;
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
  }
  .panel:last-child { border-bottom: none; }

  /* ===== モチベーションヒーロー ===== */
  .hero-stats { display: flex; flex-wrap: wrap; gap: 14px 0; margin-top: 18px; }
  .hero-stat { padding: 0 22px; border-left: 1px solid var(--border); min-width: 120px; }
  .hs-lbl { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .hs-val { font-size: 30px; font-weight: 900; line-height: 1.2; }
  .hs-val small { font-size: 13px; font-weight: 700; color: var(--muted); }

  /* ===== カレンダー ===== */
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-title { font-size: 20px; font-weight: 800; }
  .cal-nav { display: flex; gap: 8px; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text); cursor: pointer; font-size: 16px;
    display: inline-flex; align-items: center; justify-content: center; transition: 0.15s;
  }
  .icon-btn:hover { border-color: var(--primary); color: var(--primary); }
  .btn {
    border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: 0.15s; background: var(--primary); color: var(--on-primary);
  }
  .btn:hover { background: var(--primary-dark); }
  .btn.ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn.ghost:hover { border-color: var(--primary); color: var(--primary); }
  .btn.danger { background: transparent; color: var(--danger); border: 1px solid var(--border); }
  .btn.danger:hover { border-color: var(--danger); background: rgba(226,75,74,0.08); }
  .btn.sm { padding: 6px 12px; font-size: 13px; }
  .btn.block { width: 100%; }

  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 6px; }
  .weekdays span { text-align: center; font-size: 12px; font-weight: 700; color: var(--muted); padding: 4px 0; }
  .weekdays span.sun { color: var(--danger); }
  .weekdays span.sat { color: var(--primary); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-cell {
    position: relative; min-height: 74px; border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface-2); padding: 6px; cursor: pointer; transition: 0.12s; overflow: hidden;
    /* スマホ長押しで文字選択・メニューを出さない */
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }
  .cal-cell:hover { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light) inset; }
  .cal-cell.empty { background: transparent; border: none; cursor: default; }
  .cal-cell.today { border-color: var(--primary); }
  .cal-cell.today .daynum { background: var(--primary); color: var(--on-primary); }
  .cal-cell.selected { box-shadow: 0 0 0 2px var(--primary) inset; }
  .daynum {
    font-size: 13px; font-weight: 700; width: 24px; height: 24px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cal-cell.sun .daynum { color: var(--danger); }
  .cal-cell.sat .daynum { color: var(--primary); }
  .cal-cell.today .daynum { color: var(--on-primary); }
  .dots { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .cell-count {
    position: absolute; bottom: 5px; right: 7px; font-size: 10px; font-weight: 700; color: var(--muted);
  }

  /* ===== 凡例 ===== */
  .legend { display: flex; flex-wrap: wrap; gap: 10px 16px; margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--border); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-item .dot { width: 10px; height: 10px; }

  /* ===== 日別詳細 ===== */
  .day-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .day-date { font-size: 18px; font-weight: 800; }
  .day-date small { display: block; font-size: 12px; font-weight: 600; color: var(--muted); }

  .cat-group { margin-bottom: 14px; }
  .cat-group-head { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 14px; margin-bottom: 8px; }
  .cat-badge { width: 10px; height: 10px; border-radius: 50%; }

  .ex-card {
    border: 1px solid var(--border); border-radius: 12px; background: var(--surface-2);
    padding: 12px 14px; margin-bottom: 8px;
  }
  .ex-card-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .ex-name { font-weight: 700; }
  .ex-sets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .set-chip {
    font-size: 12px; font-weight: 600; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 9px; color: var(--muted);
  }
  .set-chip b { color: var(--text); }
  .ex-memo { font-size: 13px; color: var(--muted); margin-top: 8px; font-style: italic; }
  .ex-actions { display: flex; gap: 4px; }
  .link-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 6px; }
  .link-btn:hover { color: var(--primary); background: var(--primary-light); }
  .link-btn.del:hover { color: var(--danger); background: rgba(226,75,74,0.08); }

  .empty-state { text-align: center; color: var(--muted); padding: 30px 10px; font-size: 14px; }
  .empty-state .big { font-size: 30px; margin-bottom: 8px; }

  /* ===== モーダル ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none;
    align-items: flex-start; justify-content: center; padding: 20px; z-index: 50; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 18px; width: 100%; max-width: 520px; margin: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: pop 0.18s ease;
  }
  @keyframes pop { from { transform: scale(0.96); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-head { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-head h3 { font-size: 17px; }
  .modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; }
  .modal-foot { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  label.field-label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface-2); color: var(--text); font-size: 14px; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
  .field { margin-bottom: 16px; }

  .cat-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .cat-chip {
    border: 1px solid var(--border); background: var(--surface-2); border-radius: 999px;
    padding: 7px 14px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.12s;
    display: inline-flex; align-items: center; gap: 6px; color: var(--text);
  }
  .cat-chip:hover { border-color: var(--primary); }
  .cat-chip.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
  .cat-chip.active .cat-badge { box-shadow: 0 0 0 2px rgba(255,255,255,0.6); }

  .menu-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 480px) { .menu-list { grid-template-columns: 1fr; } }
  .menu-item {
    text-align: left; border: 1px solid var(--border); background: var(--surface-2);
    border-radius: 10px; padding: 10px 12px; font-size: 14px; cursor: pointer; transition: 0.12s; color: var(--text);
  }
  .menu-item:hover { border-color: var(--primary); color: var(--primary); }
  .menu-item.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 700; }
  .menu-item .tag { font-size: 10px; color: var(--muted); margin-left: 4px; }
  .menu-item.custom .tag { color: var(--warning); }
  .menu-item { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .menu-item .mi-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mi-actions { display: flex; gap: 2px; flex: 0 0 auto; }
  .mi-ico { border: none; background: transparent; cursor: pointer; font-size: 12px; padding: 2px 5px; border-radius: 6px; opacity: 0.65; line-height: 1; }
  .mi-ico:hover { opacity: 1; background: rgba(128,128,128,0.18); }
  .inline-form { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
  .inline-form input { flex: 1; min-width: 130px; }
  .inline-form select { width: auto; flex: 0 0 auto; }

  .sets-editor .set-row { display: grid; grid-template-columns: 28px 1fr 1fr 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .sets-editor .set-row .setno { font-weight: 700; color: var(--muted); font-size: 13px; text-align: center; }
  .sets-editor .unit { position: relative; }
  .sets-editor .unit span { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--muted); pointer-events: none; }
  .sets-editor .set-row input { padding-right: 30px; }
  .remove-set { border: 1px solid var(--border); background: var(--surface-2); border-radius: 8px; cursor: pointer; height: 38px; color: var(--danger); }
  .remove-set:hover { border-color: var(--danger); }

  .cardio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .section-title { font-size: 15px; font-weight: 800; margin: 4px 0 12px; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

  /* オリジナルメニュー管理 */
  .custom-menu-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface-2); margin-bottom: 8px; }
  .custom-menu-row .info { display: flex; align-items: center; gap: 8px; }
  .routine-list { display: grid; gap: 10px; margin-top: 12px; }
  .routine-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; border-left: 1px solid var(--border); padding: 8px 0 8px 14px; }
  .routine-title { font-weight: 800; }
  .routine-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .routine-editor { display: grid; gap: 10px; }
  .routine-ex-row { border-left: 1px solid var(--border); padding-left: 12px; display: grid; gap: 8px; }
  .routine-ex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 520px) { .routine-ex-grid { grid-template-columns: 1fr; } .routine-row { align-items: flex-start; flex-direction: column; } }

  .placeholder-card { text-align: center; padding: 50px 20px; }
  .placeholder-card .big { font-size: 44px; margin-bottom: 12px; }
  .placeholder-card h2 { font-size: 20px; margin-bottom: 8px; }
  .placeholder-card p { color: var(--muted); max-width: 460px; margin: 0 auto; }

  /* ===== 前回値ヒント ===== */
  .prev-hint {
    background: var(--primary-light); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 14px; font-size: 13px; display: flex; align-items: center;
    justify-content: space-between; gap: 10px; flex-wrap: wrap;
  }
  .prev-hint .pv-label { font-weight: 700; color: var(--primary); }
  .prev-hint .pv-body { color: var(--muted); }
  .prev-hint .pv-body b { color: var(--text); }

  /* ===== 分析パネル / チャート ===== */
  .stats-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .stats-head h2 { font-size: 17px; }
  .chart-wrap { position: relative; height: 260px; margin-top: 8px; }
  .chart-wrap.sm { height: 200px; }
  .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 14px 0; margin: 14px 0; }
  .stat-card { background: none; border: none; border-radius: 0; border-left: 1px solid var(--border); padding: 2px 16px; }
  .stat-card .lbl { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .stat-card .val { font-size: 22px; font-weight: 800; margin-top: 2px; }
  .stat-card .val small { font-size: 12px; font-weight: 600; color: var(--muted); }
  .stat-card .delta { font-size: 12px; font-weight: 700; margin-top: 2px; }
  .delta.up { color: var(--success); }
  .delta.down { color: var(--danger); }
  .delta.flat { color: var(--muted); }

  /* ===== コーチコメント ===== */
  .coach-box { display: flex; gap: 12px; align-items: flex-start; border-left: 3px solid var(--primary); padding: 4px 0 4px 16px; margin-top: 4px; }
  .coach-ava { font-size: 26px; flex: 0 0 auto; line-height: 1.2; }
  .trend-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .trend-chip { font-size: 13px; font-weight: 700; border-radius: 999px; padding: 5px 12px; border: 1px solid var(--border); background: var(--surface); }
  .trend-chip.up { color: var(--success); border-color: rgba(99,153,34,0.4); }
  .trend-chip.down { color: var(--danger); border-color: rgba(226,75,74,0.4); }
  .trend-chip.flat { color: var(--muted); }

  /* ===== AIトレーナー / 写真推定 ===== */
  .trainer-screen {
    height: calc(100dvh - 150px);
    min-height: 520px;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border-radius: 22px;
    overflow: hidden;
  }
  .trainer-top {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .trainer-name { font-weight: 900; font-size: 13px; letter-spacing: 0.02em; }
  .chat-box { flex: 1 1 auto; overflow-y: auto; display: grid; align-content: start; gap: 10px; background: transparent; border-radius: 0; padding: 14px; }
  .chat-msg { max-width: 82%; justify-self: start; }
  .chat-msg.user { justify-self: end; text-align: left; }
  .chat-msg .role { display: none; }
  .chat-msg .text {
    margin-top: 0;
    white-space: pre-wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px 18px 18px 4px;
    padding: 10px 13px;
    font-size: 14px;
  }
  .chat-msg.user .text {
    background: #d9fdd3;
    color: #111;
    border-color: #c7edc0;
    border-radius: 18px 18px 4px 18px;
  }
  .quick-prompts { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .chat-input-row { flex: 0 0 auto; display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 0; padding: 10px; border-top: 1px solid var(--border); background: var(--surface); }
  .chat-input-row textarea { border-radius: 999px; min-height: 42px; resize: none; }
  .sync-pill { display: inline-flex; gap: 6px; align-items: center; border-left: 1px solid var(--border); padding-left: 12px; color: var(--muted); font-size: 12px; font-weight: 700; }
  .photo-preview { max-width: 100%; border-radius: 12px; margin: 8px 0; border: 1px solid var(--border); }
  .estimate-box { border-left: 3px solid var(--warning); padding: 6px 0 6px 12px; margin-top: 10px; }
  .settings-section { border-left: 1px solid var(--border); padding-left: 14px; margin-bottom: 18px; }
  .settings-section-title { font-size: 13px; font-weight: 900; margin-bottom: 10px; }
  .fab {
    position: fixed;
    right: 22px;
    bottom: calc(82px + env(safe-area-inset-bottom));
    z-index: 45;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    background: var(--primary);
    color: var(--on-primary);
    font-size: 30px;
    line-height: 1;
    cursor: pointer;

<body>

<!-- 記録追加・編集モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">トレーニングを追加</h3>

<!-- レストタイマー（モーダルを閉じても継続する常駐ピル） -->
<div class="rest-timer" id="restTimer" role="timer" aria-live="polite">
  <span class="rt-ico">⏱</span>
  <span class="rt-time" id="restTimerTime">0:00</span>
  <button type="button" id="restTimerPlus">+30s</button>
  <button type="button" id="restTimerStop" aria-label="タイマー停止">✕</button>
</div>

<script>
/* =====================================================================
 *  Workout Tracker  -  単一HTMLアプリ
 *  拡張方針:
 *   - 機能は「モジュール」として App.registerModule() で登録 → タブが自動生成
 *   - データは Store が一元管理（モジュールごとに名前空間を分離）
 *   - 体組成 / 食事管理 などは module を追加するだけで組み込める
 * ===================================================================== */

/* ---------------- Store: 永続化レイヤー ---------------- */
const Store = (() => {
  const KEY = 'fittrack.v1';
  let data = load();

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { console.warn('load失敗', e); }
    return { version: 1 };
  }
  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify(data));
    } catch (e) {
      console.error('保存失敗', e);
      try { toast('⚠ データ保存に失敗しました（容量不足の可能性）。バックアップを取ってください'); } catch (_) {}
    }
  }

  // 全データのJSONバックアップ / 復元
  function exportAll() { return JSON.stringify(data, null, 2); }
  function importAll(json) {
    const obj = JSON.parse(json);
    if (!obj || typeof obj !== 'object' || Array.isArray(obj)) throw new Error('不正なバックアップファイルです');
    data = obj;
    if (!data.version) data.version = 1;
    save();
  }

  // モジュールごとの名前空間を取得（無ければ初期値で作成）
  function ns(name, initial = {}) {
    if (!data[name]) { data[name] = initial; save(); }
    return data[name];
  }
  return { get data() { return data; }, save, ns, exportAll, importAll };
})();

/* ---------------- 共通ユーティリティ ---------------- */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const pad = n => String(n).padStart(2, '0');
const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const WEEK_JP = ['日', '月', '火', '水', '木', '金', '土'];

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ---------------- レストタイマー（グローバル常駐） ---------------- */
const RestTimer = (() => {
  const el = document.getElementById('restTimer');
  const timeEl = document.getElementById('restTimerTime');
  let endAt = null, iv = null;

  function fmt(sec) { return `${Math.floor(sec / 60)}:${pad(sec % 60)}`; }

  function tick() {
    const rest = Math.max(0, Math.ceil((endAt - Date.now()) / 1000));
    timeEl.textContent = fmt(rest);
    if (rest <= 0) {
      clearInterval(iv); iv = null;
      el.classList.add('done');
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      toast('レスト終了！次のセットへ 💪');
      setTimeout(() => { if (!iv) hide(); }, 3000);
    }
  }
  function run() { clearInterval(iv); iv = setInterval(tick, 250); tick(); }
  function start(sec) {
    endAt = Date.now() + sec * 1000;
    el.classList.add('on'); el.classList.remove('done');
    run();
  }
  function hide() { el.classList.remove('on', 'done'); clearInterval(iv); iv = null; endAt = null; }

  document.getElementById('restTimerPlus').onclick = () => {
    if (!endAt) return;
    endAt = Math.max(endAt, Date.now()) + 30000;
    el.classList.remove('done');
    run();
  };
  document.getElementById('restTimerStop').onclick = hide;
  return { start };
})();

/* ---------------- 数値 / 日付ヘルパ ---------------- */
function parseNum(v) {
  if (v === null || v === undefined) return undefined;
  const cleaned = String(v).replace(/,/g, '').replace(/[^\d.\-]/g, '').trim();
  if (!cleaned || cleaned === '-') return undefined;
  const n = Number(cleaned);
  return Number.isFinite(n) ? n : undefined;
}
function round(v, d = 1) { if (!Number.isFinite(v)) return undefined; const b = 10 ** d; return Math.round(v * b) / b; }
function fmtMonthDay(key) { const [, m, d] = key.split('-'); return `${Number(m)}/${Number(d)}`; }
// InBody等の様々な日付表記を YYYY-MM-DD に正規化
function normDateKey(value) {
  const raw = String(value || '').trim();
  if (!raw) return null;
  const digits = raw.replace(/[^\d]/g, '');
  if (digits.length >= 8) return `${digits.slice(0, 4)}-${digits.slice(4, 6)}-${digits.slice(6, 8)}`;
  const dt = new Date(raw.replace(/\//g, '-'));
  return Number.isNaN(dt.getTime()) ? null : dateKey(dt);
}

/* ---------------- CSV パーサ（引用符対応） ---------------- */
function parseCSV(text) {
  const rows = []; let row = [], cell = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i + 1];
    if (c === '"' && q && n === '"') { cell += '"'; i++; }
    else if (c === '"') { q = !q; }
    else if (c === ',' && !q) { row.push(cell); cell = ''; }
    else if ((c === '\n' || c === '\r') && !q) {
      if (c === '\r' && n === '\n') i++;
      row.push(cell);
      if (row.some(v => String(v).trim() !== '')) rows.push(row);
      row = []; cell = '';
    } else cell += c;
  }
  row.push(cell);
  if (row.some(v => String(v).trim() !== '')) rows.push(row);
  return rows;
}

/* ---------------- Chart.js ラッパ（インスタンス管理） ---------------- */
const Charts = (() => {
  const instances = {};
  function gridColor() {
    return getComputedStyle(document.body).getPropertyValue('color').trim() ? 'rgba(128,128,128,0.18)' : 'rgba(128,128,128,0.18)';
  }
  let zoomRegistered = false;
  function ensureZoom() {
    if (!zoomRegistered && typeof Chart !== 'undefined' && window.ChartZoom) {
      Chart.register(window.ChartZoom);
    }
    zoomRegistered = true;
  }
  function draw(canvasId, config) {
    if (typeof Chart === 'undefined') return;
    ensureZoom();
    if (instances[canvasId]) instances[canvasId].destroy();
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    config.options = config.options || {};
    config.options.responsive = true;
    config.options.maintainAspectRatio = false;
    config.options.plugins = config.options.plugins || {};
    config.options.plugins.legend = config.options.plugins.legend || { labels: { color: cssVar('--muted'), boxWidth: 12 } };
    config.options.scales = config.options.scales || {};
    for (const ax of ['x', 'y', 'y1']) if (config.options.scales[ax]) Object.assign(config.options.scales[ax], { ticks: { color: cssVar('--muted'), ...(config.options.scales[ax].ticks || {}) }, grid: { color: gridColor(), ...(config.options.scales[ax].grid || {}) } });
    instances[canvasId] = new Chart(ctx, config);
    if (config.type === 'line') autoPoints(instances[canvasId]);
    return instances[canvasId];
  }
  function get(canvasId) { return instances[canvasId]; }
  // 「全体」ボタン用: 初期表示が絞られていても全期間を表示する
  function resetZoom(canvasId) {
    const c = instances[canvasId];
    if (!c) return;
    if (c.options.scales && c.options.scales.x) { c.options.scales.x.min = undefined; c.options.scales.x.max = undefined; }
    c.update();
    autoPoints(c);
  }
  return { draw, get, resetZoom };
})();
function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#888'; }
// 折れ線グラフ共通: ピンチ/ホイールで拡大・ドラッグで移動
// maxIndex を渡すと全データ範囲までパン可能（初期表示を絞っている場合用）
function zoomOpts(maxIndex) {
  const limits = { x: { minRange: 2 } };
  if (Number.isFinite(maxIndex)) { limits.x.min = 0; limits.x.max = maxIndex; }
  return {
    pan: { enabled: true, mode: 'x', onPanComplete: ({ chart }) => autoPoints(chart) },
    zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x', onZoomComplete: ({ chart }) => autoPoints(chart) },
    limits,
  };
}
function edgeXTicks(count) {
  return {
    maxRotation: 0,
    autoSkip: false,
    callback(value) {
      const x = this.chart.scales.x;
      const min = Math.ceil(x.min ?? 0);
      const max = Math.floor(x.max ?? (count - 1));
      return value === min || value === max ? this.getLabelForValue(value) : '';
    },
  };
}
// 表示中のデータ点が30以上ならポイントマーカーを消して見やすくする
function autoPoints(chart) {
  const x = chart.scales && chart.scales.x;
  if (!x || chart.config.type !== 'line') return;
  const visible = Math.ceil(x.max) - Math.floor(x.min) + 1;
  const r = visible >= 30 ? 0 : 4;
  const hr = visible >= 30 ? 4 : 7;
  const bw = visible >= 30 ? 0 : 2;
  let changed = false;
  chart.data.datasets.forEach(ds => {
    if (ds.pointRadius !== r || ds.pointHoverRadius !== hr || ds.pointBorderWidth !== bw) {
      ds.pointRadius = r;
      ds.pointHoverRadius = hr;
      ds.pointBorderWidth = bw;
      ds.pointBackgroundColor = cssVar('--surface');
      changed = true;
    }
  });
  if (changed) chart.update('none');
}

/* ---------------- CSV 書き出し ---------------- */
function csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function toCSV(headers, rows) {
  const lines = [headers.map(csvEscape).join(',')];
  rows.forEach(r => lines.push(r.map(csvEscape).join(',')));
  return lines.join('\n');
}
function downloadFile(filename, content, mime = 'text/csv;charset=utf-8') {
  // BOM付与でExcelの文字化けを防ぐ
  const blob = new Blob(['\uFEFF' + content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ---------------- モーダル制御 ---------------- */
const Modal = (() => {
  const overlay = document.getElementById('modal');
  const titleEl = document.getElementById('modalTitle');
  const bodyEl = document.getElementById('modalBody');
  const saveBtn = document.getElementById('modalSave');
  let onSave = null;

  overlay.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', close));
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

  function open({ title, bodyHTML, onSave: cb, saveLabel = '保存' }) {
    titleEl.textContent = title;
    bodyEl.innerHTML = bodyHTML;
    saveBtn.textContent = saveLabel;
    saveBtn.style.display = cb ? '' : 'none';
    onSave = cb;
    overlay.classList.add('open');
    return bodyEl;
  }
  function close() { overlay.classList.remove('open'); onSave = null; }

  saveBtn.onclick = () => { if (onSave && onSave(bodyEl) !== false) close(); };
  return { open, close, get body() { return bodyEl; } };
})();

/* =====================================================================
 *  User Settings: アカウント紐付け/初期設定（モック）
 *  後でSupabase/Firebaseに差し替えやすいよう、ユーザー情報を独立namespaceで管理
 * ===================================================================== */
const UserSettings = (() => {
  const state = Store.ns('user', {
    account: { email: '', displayName: '', syncId: '' },
    profile: { heightCm: '', age: '', sex: '', goal: '筋肉を増やす', activity: '週2-3回' },
    setupDone: false,
  });

  function init() {
    const btn = document.getElementById('accountBtn');
    if (btn) {
      btn.onclick = () => openSettings(false);
      renderButton();
    }
    if (!state.setupDone) setTimeout(() => openSettings(true), 400);
  }

  function renderButton() {
    const btn = document.getElementById('accountBtn');
    if (!btn) return;
    btn.textContent = '⚙';
    btn.title = state.account.email ? `同期ID: ${state.account.syncId}` : '初期設定・アカウント紐付け';
  }

  function syncId(email) {
    if (!email) return '';
    let h = 0;
    for (let i = 0; i < email.length; i++) h = ((h << 5) - h + email.charCodeAt(i)) | 0;
    return 'TL-' + Math.abs(h).toString(36).toUpperCase().padStart(6, '0').slice(0, 6);
  }

  function openSettings(isInitial = false) {
    Modal.open({
      title: isInitial ? '初期設定' : 'アカウント・プロフィール',
      saveLabel: '保存',
      bodyHTML: `
        <div class="settings-section" data-section="account">
          <div class="settings-section-title">アカウント</div>
          <div class="field">
            <label class="field-label">アカウント紐付け（モック）</label>
            <input id="uEmail" type="email" placeholder="メールアドレス" value="${escapeHTML(state.account.email || '')}">
            <p class="hint">今は端末内保存です。後でクラウド同期を接続する時、このメールアドレス/同期IDに紐付けます。</p>
          </div>
        </div>
        <div class="settings-section" data-section="profile">
          <div class="settings-section-title">プロフィール</div>
          <div class="pfc-grid" style="grid-template-columns:1fr 1fr;">
            <div class="field"><label class="hint">表示名</label><input id="uName" value="${escapeHTML(state.account.displayName || '')}" placeholder="例: Daisuke"></div>
            <div class="field"><label class="hint">身長(cm)</label><input id="uHeight" type="number" step="0.1" value="${state.profile.heightCm || ''}" placeholder="170"></div>
            <div class="field"><label class="hint">年齢</label><input id="uAge" type="number" value="${state.profile.age || ''}" placeholder="30"></div>
            <div class="field"><label class="hint">性別</label>
              <select id="uSex">
                ${['', '男性', '女性', 'その他'].map(v => `<option value="${v}" ${state.profile.sex === v ? 'selected' : ''}>${v || '未設定'}</option>`).join('')}
              </select>
            </div>
            <div class="field"><label class="hint">目標</label>
              <select id="uGoal">
                ${['筋肉を増やす', '体脂肪を落とす', '体力をつける', '健康維持', '大会・イベントに向ける'].map(v => `<option ${state.profile.goal === v ? 'selected' : ''}>${v}</option>`).join('')}
              </select>
            </div>
            <div class="field"><label class="hint">運動頻度</label>
              <select id="uActivity">
                ${['週1回以下', '週2-3回', '週4-5回', '週6回以上'].map(v => `<option ${state.profile.activity === v ? 'selected' : ''}>${v}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
        <div class="settings-section" data-section="data">
          <div class="settings-section-title">データ管理</div>
          <div class="toolbar">
            <button type="button" class="btn ghost sm" id="backupBtn">💾 バックアップ（JSON）</button>
            <button type="button" class="btn ghost sm" id="restoreBtn">📂 復元（JSON読込）</button>
            <input type="file" id="restoreFile" accept=".json,application/json" style="display:none">
          </div>
          <p class="hint">トレーニング・体組成・食事・設定の全データを1ファイルに保存/復元します。データはこのブラウザ内にしか無いため、機種変更・ブラウザ削除に備えて定期的な保存をおすすめします。</p>
        </div>
        <div class="estimate-box">

      onSave: (body) => {

        state.account.displayName = body.querySelector('#uName').value.trim();
        state.account.syncId = syncId(email);
        state.profile.heightCm = numOrNull(body.querySelector('#uHeight').value) || '';
        state.profile.age = numOrNull(body.querySelector('#uAge').value) || '';
        state.profile.sex = body.querySelector('#uSex').value;
        state.profile.goal = body.querySelector('#uGoal').value;
        state.profile.activity = body.querySelector('#uActivity').value;
        state.setupDone = true;
        Store.save();
        renderButton();
        toast('プロフィールを保存しました');
      },
    });
    const email = Modal.body.querySelector('#uEmail');
    const preview = Modal.body.querySelector('#syncIdPreview');
    email.oninput = () => preview.textContent = `同期ID: ${syncId(email.value.trim()) || '-'}`;

    // データ管理: バックアップ / 復元
    Modal.body.querySelector('#backupBtn').onclick = () => {
      downloadFile(`tralog-backup-${dateKey(new Date())}.json`, Store.exportAll(), 'application/json;charset=utf-8');
      toast('バックアップを書き出しました');
    };
    const restoreFile = Modal.body.querySelector('#restoreFile');
    Modal.body.querySelector('#restoreBtn').onclick = () => restoreFile.click();
    restoreFile.onchange = () => {
      const file = restoreFile.files && restoreFile.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          if (!confirm('現在のデータをバックアップの内容で上書きします。よろしいですか？')) { restoreFile.value = ''; return; }
          Store.importAll(reader.result);
          toast('復元しました。再読み込みします…');
          setTimeout(() => location.reload(), 600);
        } catch (e) {
          console.error(e);
          toast('復元に失敗しました。ファイルを確認してください');
          restoreFile.value = '';
        }
      };
      reader.readAsText(file);
    };
  }

  return { init, get state() { return state; }, openSettings };
})();

/* =====================================================================
 *  App: モジュールレジストリ + タブ
 * ===================================================================== */
const App = (() => {
  const modules = [];
  let active = null;
  const tabbar = document.getElementById('tabbar');
  const view = document.getElementById('view');

  function registerModule(mod) { modules.push(mod); }

  function renderTabs() {
    tabbar.innerHTML = '';
    modules.forEach(mod => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (mod.id === active ? ' active' : '');
      btn.innerHTML = `<span class="tab-ico">${mod.icon || ''}</span><span class="tab-lbl">${mod.label}</span>` +
        (mod.comingSoon ? ' <span class="soon">準備中</span>' : '');
      btn.onclick = () => activate(mod.id);
      tabbar.appendChild(btn);
    });
  }

  function activate(id) {
    active = id;
    renderTabs();
    view.innerHTML = '';
    const mod = modules.find(m => m.id === id);
    const el = document.createElement('div');
    el.className = 'module-view';
    view.appendChild(el);
    mod.render(el);
  }

  function start() {
    if (modules.length) activate(modules[0].id);
  }
  return { registerModule, start, rerender: () => active && activate(active) };
})();
